<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Automation — Ethan's Course</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0908;
    --surface: #130f0e;
    --surface2: #1a1412;
    --border: #241c1a;
    --teal: #e8735a;
    --teal-dim: #e8735a16;
    --teal-glow: #e8735a32;
    --teal-mid: #d4614a;
    --green: #22d4a0;
    --green-dim: #22d4a012;
    --text: #ffffff;
    --muted: #8a8280;
    --muted2: #d8d4d0;
    --danger: #ff5a6a;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 15px; line-height: 1.6; }
  .shell { display: flex; min-height: 100vh; overflow-x: hidden; width: 100%; }
  .shell.sidebar-collapsed .sidebar { width: 0; min-width: 0; overflow: hidden; border-right: none; }
  .shell.sidebar-collapsed .main { max-width: 100%; }

  /* SIDEBAR */
  .sidebar { width: 290px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; transition: width 0.25s ease, border 0.25s ease; }
  .sidebar-header { padding: 58px 20px 14px; border-bottom: 1px solid var(--border); }
  .course-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--teal); text-transform: uppercase; margin-bottom: 5px; }
  .course-title { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .progress-bar-wrap { margin-top: 12px; background: var(--border); border-radius: 99px; height: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--green)); border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { margin-top: 5px; font-size: 11px; color: var(--muted); }
  .nav-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .nav-section-label { padding: 5px 18px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .nav-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 18px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active { background: var(--teal-dim); border-left-color: var(--teal); }
  .check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; color: var(--muted); transition: all 0.2s; margin-top: 1px; }
  .nav-item.completed .check { background: var(--green-dim); border-color: var(--green); color: var(--green); font-size: 10px; }
  .nav-label { font-size: 12.5px; color: var(--muted); line-height: 1.35; }
  .nav-item.active .nav-label, .nav-item.completed .nav-label { color: var(--text); }
  .nav-item.active .nav-label { color: #ffffff; }

  /* MAIN */
  .main { flex: 1; padding: 52px 48px 52px 60px; max-width: 800px; min-width: 0; overflow-x: hidden; }
  .module-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .module-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); background: var(--teal-dim); border: 1px solid var(--teal-glow); padding: 3px 11px; border-radius: 99px; }
  .read-time { font-size: 11px; color: #a09890; }
  .module-title { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 10px; }
  .module-subtitle { font-size: 15px; color: #d0c8c4; margin-bottom: 36px; max-width: 580px; line-height: 1.65; }

  /* CONTENT */
  .content-block { margin-bottom: 30px; }
  .section-heading { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 12px; margin-top: 36px; padding-top: 36px; border-top: 1px solid var(--border); }
  .section-heading:first-child { margin-top: 0; padding-top: 0; border-top: none; }
  .block-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
  .prose { font-size: 15px; color: #d8d0cc; line-height: 1.8; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose em { color: #d0c8c4; font-style: italic; }

  .callout { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--teal); border-radius: 6px; padding: 16px 20px; margin: 22px 0; font-size: 14px; color: #d8d0cc; line-height: 1.75; }
  .callout strong { color: var(--text); }

  .tip-block { background: #1a100e; border: 1px solid #2a1812; border-left: 3px solid var(--green); border-radius: 6px; padding: 14px 20px; margin: 22px 0; font-size: 14px; color: #f0ece8; line-height: 1.75; }
  .tip-block strong { color: var(--green); }

  .warning-block { background: #1a0d0a; border: 1px solid #2e1a12; border-left: 3px solid var(--danger); border-radius: 6px; padding: 14px 20px; margin: 22px 0; font-size: 14px; color: #f0e8e4; line-height: 1.75; }
  .warning-block strong { color: var(--danger); }

  .bullet-list { list-style: none; margin: 14px 0; }
  .bullet-list li { display: flex; gap: 12px; font-size: 14px; color: #d8d0cc; line-height: 1.7; margin-bottom: 12px; }
  .bullet-list li::before { content: '→'; color: var(--teal); flex-shrink: 0; margin-top: 1px; font-weight: 600; }

  .numbered-list { list-style: none; margin: 14px 0; counter-reset: item; }
  .numbered-list li { display: flex; gap: 14px; font-size: 14px; color: #d8d0cc; line-height: 1.7; margin-bottom: 16px; counter-increment: item; }
  .numbered-list li::before { content: counter(item); color: var(--teal); background: var(--teal-dim); border: 1px solid var(--teal-glow); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 700; margin-top: 1px; }

  .example-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; margin: 16px 0; }
  .example-card-title { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .example-card p { font-size: 14px; color: #d8d0cc; line-height: 1.7; }
  .example-card p + p { margin-top: 10px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
  .two-col .example-card { margin: 0; }

  .code-block { background: #0e0a09; border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; margin: 16px 0; font-family: 'Courier New', monospace; font-size: 12.5px; color: #ffd8cc; line-height: 1.8; overflow-x: auto; white-space: pre; max-width: 100%; word-break: break-all; }
  .code-comment { color: var(--muted); }

  .scenario-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin: 20px 0; }
  .scenario-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--teal); text-transform: uppercase; margin-bottom: 6px; }
  .scenario-title { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .scenario-body { font-size: 14px; color: #d8d0cc; line-height: 1.7; }

  .divider { height: 1px; background: var(--border); margin: 36px 0; }

  /* module image */
  .mod-img-wrap { margin: 24px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .mod-img-wrap img { width: 100%; display: block; max-height: 340px; object-fit: cover; object-position: top; }
  .mod-img-caption { padding: 8px 14px; font-size: 11px; color: var(--muted); background: var(--surface2); border-top: 1px solid var(--border); }

  /* CHECKLIST */
  .checklist-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-top: 36px; }
  .checklist-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .checklist-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .checklist-item:last-child { border-bottom: none; padding-bottom: 0; }
  .checklist-box { width: 20px; height: 20px; border-radius: 4px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.2s; font-size: 11px; }
  .checklist-item.done .checklist-box { background: var(--teal); border-color: var(--teal); color: #080c0c; font-weight: 800; }
  .checklist-item.done .checklist-text { text-decoration: line-through; color: var(--muted); }
  .checklist-text { font-size: 13.5px; color: var(--text); line-height: 1.5; }

  /* FOOTER */
  .nav-footer { display: flex; gap: 12px; margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
  .btn { padding: 10px 22px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Inter', sans-serif; }
  .btn-primary { background: var(--teal); color: #080c0c; }
  .btn-primary:hover { background: #f08070; }
  .btn-secondary { background: var(--surface2); color: #d0c8c4; border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); }
  .btn-complete { background: var(--green-dim); color: var(--green); border: 1px solid #22d4a030; }
  .btn-complete:hover { background: #22d4a020; }
  .completed-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--green-dim); border: 1px solid #22d4a030; color: var(--green); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }

  /* COSTS TABLE */
  /* CE hybrid table */
  .s5-wrap { margin: 20px 0; width: 100%; }
  .s5-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
  .s5-table thead tr th { padding: 4px 14px 8px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .s5-table thead tr th:first-child { min-width: 120px; }
  .s5-table tbody tr td { padding: 12px 14px; font-size: 13px; color: #d0c8c4; line-height: 1.65; vertical-align: top; word-break: break-word; background: var(--surface2); }
  .s5-table tbody tr td:first-child { color: var(--text); font-weight: 700; background: var(--surface); border-radius: 8px 0 0 8px; white-space: nowrap; min-width: 120px; border-right: 1px solid var(--border); }
  .s5-table tbody tr td:last-child { border-radius: 0 8px 8px 0; }
  .s5-table tbody tr td:only-child { border-radius: 8px; }
  .s5-table tbody tr:hover td { filter: brightness(1.1); }
  .s5-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; white-space: nowrap; }
  @media (max-width: 600px) {
    .s5-table { border-spacing: 0 8px; }
    .s5-table thead { display: none; }
    .s5-table tbody tr td { display: block; white-space: normal; }
    .s5-table tbody tr td:first-child { border-radius: 8px 8px 0 0 !important; border-right: none; border-bottom: 1px solid var(--border); color: var(--teal); font-size: 12px; }
    .s5-table tbody tr td:last-child { border-radius: 0 0 8px 8px !important; }
  }

  /* mobile-nav-toggle removed */
  .hamburger-btn { position: fixed; top: 14px; left: 14px; z-index: 200; width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 0; transition: background 0.15s, border-color 0.15s; outline: none; -webkit-tap-highlight-color: transparent; }
  .hamburger-btn:hover { background: var(--surface2); border-color: var(--teal); }
  .hamburger-btn:focus { outline: none; }
  .hamburger-btn:focus-visible { outline: none; }
  .hamburger-btn span { display: block; width: 16px; height: 1.5px; background: var(--text); border-radius: 2px; transition: all 0.2s ease; transform-origin: center; }
  .shell.sidebar-collapsed .hamburger-btn span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
  .shell.sidebar-collapsed .hamburger-btn span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .shell.sidebar-collapsed .hamburger-btn span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -290px; z-index: 50; transition: left 0.3s ease, width 0.25s ease; height: 100%; width: 290px; }
    .sidebar.open { left: 0; }
    .shell.sidebar-collapsed .sidebar { width: 290px; left: -290px; }
    .shell.sidebar-collapsed .sidebar.open { left: 0; }
    .main { padding: 56px 20px 28px; width: 100%; max-width: 100%; }
    .module-title { font-size: 22px; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>

// ─── 0: COSTS ────────────────────────────────────────────────────────────────
{

// ─── 1: WHAT IS AN AI WORKFLOW ───────────────────────────────────────────────
{

  sections:[
    { type:"heading", text:"The One-Sentence Definition" },
    { type:"prose", content:`Strip away the hype and an AI workflow is simple: <strong>a system where AI makes decisions inside an automated process.</strong> Not a chatbot. Not a script someone has to run manually. A thing that fires on its own, reads a situation, decides what to do, and does it.` },
    { type:"prose", content:`A regular automation is a vending machine — same input, same output, no judgment. An AI workflow is more like hiring someone: you give them context, they figure out what the situation needs, and they handle it. Even when it's a bit different every time.` },
    { type:"heading", text:"Automation vs AI Workflow — The Real Difference" },
    { type:"prose", content:`This distinction is the whole ballgame when it comes to pricing. Most people lump them together and end up charging Zapier rates for something worth 5x that.` },

    { type:"heading", text:"The 4-Part Anatomy of Every Workflow" },
    { type:"prose", content:`Every workflow — no matter how complicated it looks — is just these four things in sequence. Once you've got this wired in, you can look at any client problem and immediately see how to build a solution.` },

    { type:"example-card", title:"Real Example — Walk Through the 4 Parts", body:"A dental clinic gets 40 enquiry emails a week. Currently, a receptionist reads each one and writes a reply. <br><br><strong>Trigger:</strong> New email arrives in clinic inbox.<br><strong>Input processing:</strong> Extract sender name, email subject, and body text. Check if sender is already in Supabase patient database.<br><strong>AI step:</strong> Claude reads the enquiry, determines the type (new patient, appointment request, billing question), and writes an appropriate personalised reply using clinic information from the system prompt.<br><strong>Action:</strong> Reply sent automatically. Log entry written to Supabase with timestamp, enquiry type, and reply text." },

>\n\n  <rect x="566" y="80" width="130" height="56" rx="8" fill="#1a1412" stroke="#e8735a" stroke-opacity="0.4" stroke-width="1.5"/>\n  <text x="631" y="104" text-anchor="middle" fill="#e8735a" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1">ACTION</text>\n  <text x="631" y="120" text-anchor="middle" fill="#e8e0dc" font-family="Inter,sans-serif" font-size="11">Email sent + logged</text>\n\n  <!-- labels -->\n  <text x="360" y="185" text-anchor="middle" fill="#a09890" font-family="Inter,sans-serif" font-size="11">The 4-part anatomy — every workflow you build follows this exact sequence</text>\n</svg>', caption:"The 4-part anatomy — every workflow follows this exact sequence" },
    { type:"heading", text:"The 7 Most Common Workflow Categories" },
    { type:"prose", content:`This is what businesses actually hand over money to fix. When a client describes their problem, it'll almost always map to one of these.` },
    { type:"gen-table", headers:["Category","What it does","Typical trigger"], rows:[
      ["Enquiry handling","Reads and replies to incoming messages and form submissions automatically. Most common paid workflow.","Form submit / new email"],
      ["Lead follow-up","Fires a personalised sequence when someone shows interest. No lead goes cold.","CRM row / form submit"],
      ["Document processing","Reads invoices, CVs, contracts. Extracts key fields, summarises, flags anomalies.","Email attachment / upload"],
      ["Internal reporting","Pulls data from multiple sources, AI writes a digest, emails it to the team.","Schedule (weekly/monthly)"],
      ["Customer onboarding","Welcome sequence, account records, resource delivery triggered when a new client signs up.","Payment / signup event"],
      ["Content generation","Drafts reports, emails, product descriptions from structured inputs. Human reviews.","Manual / schedule"],
      ["Support triage","Classifies tickets by urgency, drafts replies, escalates to the right person.","New support ticket"],
    ]},
    { type:"heading", text:"What AI Workflows Cannot Do (Yet)" },
    { type:"prose", content:`Know where the edges are before you promise something you can't deliver. This is what separates people who keep clients from people who get refund requests.` },
    { type:"warning-block", content:`<strong>Don't promise any of this until you've actually built and tested it:</strong> Real-time voice (technically possible, genuinely complicated), visual interpretation of complex image layouts, anything requiring actual strategic judgment, and anything where a mistake has serious consequences — medical, legal, financial. Human in the loop for high-stakes decisions. Always.` },
    { type:"tip-block", content:`<strong>The test for whether AI is right for a task:</strong> Could a smart, diligent intern do this job if you gave them a good checklist and enough time? If yes, AI can probably do it. If it requires years of expertise, real-world intuition, or physical presence, it can't.` },

// ─── 2: THE DOE FRAMEWORK ────────────────────────────────────────────────────
{
  badge:"Module 2 · Foundations", title:"The Framework That Makes Workflows Reliable", readTime:"18 min",
  subtitle:"Why most AI builds fail in production — and the 3-layer system that fixes it.",
  sections:[
    { type:"heading", text:"Why Demos Work and Production Breaks" },
    { type:"prose", content:`Here's what happens to almost everyone: you build something, test it yourself with tidy inputs, it works great. Then a real person uses it. They write three questions in one rambling paragraph, use abbreviations, forget to fill in a field, or reply to the automated email. It breaks.` },
    { type:"prose", content:`The cause is almost always the same: <strong>one bloated prompt trying to do too many things at once, with no fallbacks and no separation between the AI's reasoning and the code executing the result.</strong> When it gets confused — and it will — you get either garbage output or a silent failure.` },
    { type:"callout", content:`<strong>The thing to internalise:</strong> AI reasons well. It's unpredictable without constraints. Your job is to give it precise instructions, hard limits, and let code handle everything that doesn't need thinking.` },
    { type:"heading", text:"The DOE Framework" },
    { type:"prose", content:`DOE is the mental model that fixes this. Directives, Orchestration, Execution — three layers, each with a specific job. Nick Saraev coined the framing but the underlying principle shows up in every well-built system.` },
    { type:"scenario-block", label:"Layer 1", title:"Directives — The Rules", body:"Everything Claude needs to know <em>before</em> it sees the user's message. This is your system prompt. It defines who Claude is in this context, what it's allowed to do, what it must never do, what format to respond in, what tone to use, and what to do when it's unsure. Think of it as the employee handbook you hand someone on their first day. The more specific, the better." },
    { type:"scenario-block", label:"Layer 2", title:"Orchestration — The Brain", body:"This is the AI making a decision. It reads the input, applies the directives, and decides what output to produce. Keep this layer doing one thing at a time. Don't ask it to read an email, classify it, decide urgency, write a reply, summarise the issue, and update a record in one prompt. Break it into separate steps. Each step should have a single, clear job." },
    { type:"scenario-block", label:"Layer 3", title:"Execution — The Hands", body:"Deterministic code carrying out the AI's decision. Sending the email. Writing the database record. Posting to Slack. Making the API call. No AI involved. This layer does exactly what it's told, every time, with no interpretation. If execution is failing, it's a code bug. If reasoning is wrong, it's a directive problem. Separation makes debugging possible." },
    { type:"heading", text:"Writing Directives That Actually Work" },
    { type:"prose", content:`If there's one thing to get right, it's this. Vague system prompt, unpredictable outputs. Tight system prompt, something you can actually deploy. Five things every directive needs to cover:` },
    { type:"numbered-list", items:[
      "<strong>Role:</strong> Who is Claude in this context? 'You are a customer support agent for Bloom Dental Clinic in Manchester.' Not 'You are a helpful assistant.' Specific.",
      "<strong>Task:</strong> What is the one job? 'Your job is to read incoming patient enquiries and write a warm, professional reply that answers their question or books them in for a consultation.' One job. Not five.",
      "<strong>Knowledge:</strong> What does Claude need to know to do the job? Include clinic hours, pricing ranges, service list, FAQs, anything a new receptionist would need to know on day one. This goes in the system prompt.",
      "<strong>Constraints:</strong> What must Claude never do? 'Do not make up prices. Do not promise appointment slots. Do not give medical advice. If unsure, say you'll follow up.' Hard limits, stated explicitly.",
      "<strong>Format:</strong> What should the output look like? 'Reply in plain English, max 3 paragraphs. Start with the patient's name. End with a call to action. No bullet points. Friendly but professional tone.'"
    ]},
    { type:"callout", content:`<strong>Always include a fallback.</strong> Something like: 'If you can't answer this confidently with the information provided, say: "Thanks for reaching out — someone from our team will follow up within 24 hours."' This catches the edge cases your directive didn't anticipate. Without it, Claude will hallucinate an answer instead of admitting it doesn't know.` },
    { type:"heading", text:"A Full Example Directive" },
    { type:"code", content:`You are a patient enquiry assistant for Bloom Dental Clinic, Manchester.

YOUR JOB:
Read the incoming patient message and write a warm, professional reply.
Answer their question if you can. If they want to book, guide them to 
call 0161 XXX XXXX or use the booking link: bloomdental.co.uk/book

CLINIC INFORMATION:
- Open Mon–Fri 8am–6pm, Sat 9am–1pm
- Services: checkups (£60), hygiene (£80), whitening (£299), Invisalign (from £2,500)
- New patients welcome. NHS not accepted.
- Emergency appointments available same-day if called before 10am

CONSTRAINTS:
- Never quote exact treatment costs beyond the ranges above
- Never diagnose dental conditions
- Never promise a specific appointment slot
- Do not discuss competitor clinics

FORMAT:
- Start with "Hi [Name],"
- Max 3 short paragraphs
- End with a clear next step
- Warm, professional tone — like a friendly receptionist, not a robot

IF UNSURE:
Reply: "Thanks for your message — I'll make sure one of our team 
gets back to you shortly to help with this."` },
    { type:"heading", text:"Orchestration: Breaking Tasks Into Steps" },
    { type:"prose", content:`One prompt, one job. That's the rule. Chaining is how you handle complexity without making any single step fragile.` },
    { type:"bullets", items:[
      "<strong>Step 1 — Classify:</strong> Ask Claude to read the message and output a single word: BOOKING, BILLING, COMPLAINT, GENERAL, URGENT. Nothing else.",
      "<strong>Step 2 — Route:</strong> Use n8n's switch node to send the message down different paths based on that classification.",
      "<strong>Step 3 — Respond:</strong> Each path has its own Claude step with a directive tuned specifically for that message type.",
      "<strong>Step 4 — Log:</strong> All paths end with an execution step that writes the output to Supabase and sends the reply."
    ]},
    { type:"tip-block", content:`<strong>The single-job test:</strong> Write the prompt's job in one sentence, starting with a verb. 'Classify this into one of 5 categories.' 'Write a reply.' 'Extract the name, number, and issue.' If you can't do it in one sentence, split the step.` },
    { type:"heading", text:"Execution: What Goes in Code vs AI" },
    { type:"prose", content:`If it doesn't require reading, understanding, or deciding — it shouldn't involve AI. Code is faster, cheaper, and predictable. Use it for everything mechanical.` },
    { type:"two-col", items:[
      { title:"Use AI for...", body:"Reading and understanding text. Classifying or categorising. Writing natural language. Making decisions with nuance. Summarising or extracting meaning from unstructured data." },
      { title:"Use code for...", body:"Sending emails. Writing database records. Formatting data. Making API calls. Routing logic (if classification = X, do Y). Date/time operations. Any arithmetic." }
    ]},
    { type:"warning-block", content:`<strong>Never have AI decide and act in the same step.</strong> If Claude decides something should be escalated and sends the escalation email in one move, you have no checkpoint. Separate the decision from the action. AI decides. Code acts.` },
  ],
  checklist:[
    "I can explain DOE without looking at notes",
    "I can write a system prompt using all 5 parts of the directive structure",
    "I always include a fallback instruction in every system prompt",
    "I can apply the single-job test to any prompt I write",
    "I know which parts of a workflow should be AI vs code"
  ]
},

// ─── 3: TOOLS DEEP DIVE ──────────────────────────────────────────────────────
{
  badge:"Module 3 · Foundations", title:"Your Tools, Deep Dive", readTime:"20 min",
  subtitle:"What each tool actually does, how it fits into a workflow, and what to learn first in each one.",
  sections:[
    { type:"heading", text:"n8n — Your Workflow Engine" },
    { type:"prose", content:`n8n is where everything comes together. Visual builder — you connect nodes on a canvas and the result runs automatically. Think of it as the plumbing. Claude is the brain, Supabase is the memory, Resend sends the emails — n8n is what ties them into a single working system.` },
    { type:"prose", content:`It handles the mechanical side — connecting services, running on schedules, branching on conditions, looping through lists, catching errors. Everything you'd otherwise have to write custom code for.` },
    { type:"bullets", items:[
      "<strong>Nodes:</strong> Each step in your workflow is a 'node'. There are trigger nodes (what starts the workflow), action nodes (what it does), and logic nodes (if/else, loops, merges).",
      "<strong>Expressions:</strong> You can reference data from previous steps using expressions like {{ $json.email }} or {{ $node['Step Name'].json.output }}. Learn this early — it's how data flows between steps.",
      "<strong>Error workflow:</strong> Set a separate workflow to run when something fails. Sends you a Telegram/email alert instead of silently failing. Essential for client workflows.",
      "<strong>Credentials:</strong> All API keys and auth tokens are stored in n8n's credential store. You set them once, reference them in any node.",
      "<strong>Webhook trigger:</strong> The most versatile trigger. Any external service that can send an HTTP request can start your workflow. Tally forms, Stripe payments, GitHub pushes — all use this."
    ]},
    { type:"svg-img", svg:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" style="width:100%;height:auto;display:block;background:#0e0a09">\n  <!-- canvas bg -->\n  <rect x="0" y="0" width="720" height="240" fill="#0e0a09"/>\n  <!-- grid dots -->\n  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">\n    <circle cx="12" cy="12" r="1" fill="#241c1a"/>\n  </pattern>\n  <rect width="720" height="240" fill="url(#dots)"/>\n  <!-- nodes -->\n  <rect x="40" y="90" width="120" height="52" rx="8" fill="#1a1412" stroke="#e8735a" stroke-width="1.5"/>\n  <rect x="40" y="90" width="120" height="16" rx="8" fill="#e8735a" opacity="0.15"/>\n  <text x="100" y="103" text-anchor="middle" fill="#e8735a" font-family="monospace" font-size="9" font-weight="700">WEBHOOK</text>\n  <text x="100" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Tally Form</text>\n  <text x="100" y="134" text-anchor="middle" fill="#a09890" font-family="monospace" font-size="9">POST /webhook/xyz</text>\n  <!-- connector -->\n  <path d="M160,116 C190,116 200,116 220,116" stroke="#e8735a" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>\n  <defs>\n    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">\n      <path d="M0,0 L0,6 L7,3 z" fill="#e8735a" opacity="0.5"/>\n    </marker>\n  </defs>\n  <rect x="220" y="90" width="140" height="52" rx="8" fill="#1a1412" stroke="#241c1a" stroke-width="1.5"/>\n  <text x="290" y="103" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="9" font-weight="700">HTTP REQUEST</text>\n  <text x="290" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Claude API</text>\n  <text x="290" y="134" text-anchor="middle" fill="#a09890" font-family="monospace" font-size="9">api.anthropic.com</text>\n  <path d="M360,116 C390,116 400,116 420,116" stroke="#e8735a" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>\n  <rect x="420" y="90" width="120" height="52" rx="8" fill="#1a1412" stroke="#241c1a" stroke-width="1.5"/>\n  <text x="480" y="103" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="9" font-weight="700">CODE</text>\n  <text x="480" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Parse response</text>\n  <text x="480" y="134" text-anchor="middle" fill="#a09890" font-family="monospace" font-size="9">extract .content[0]</text>\n  <path d="M540,116 C570,116 580,116 600,116" stroke="#e8735a" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>\n  <rect x="600" y="90" width="100" height="52" rx="8" fill="#1a1412" stroke="#241c1a" stroke-width="1.5"/>\n  <text x="650" y="103" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="9" font-weight="700">SEND EMAIL</text>\n  <text x="650" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Resend API</text>\n  <text x="650" y="134" text-anchor="middle" fill="#a09890" font-family="monospace" font-size="9">to: {{email}}</text>\n  <text x="360" y="200" text-anchor="middle" fill="#a09890" font-family="monospace" font-size="10">n8n canvas — your first workflow: Webhook → Claude → Parse → Send Email</text>\n</svg>', caption:"The n8n canvas — each box is a node. Connect them left to right and the workflow runs automatically." },
    { type:"tip-block", content:`<strong>Where to start in n8n:</strong> Three nodes. Webhook trigger → HTTP Request to Claude API → Send Email. That's it. Get comfortable with how data passes between nodes before you add anything else.` },
    { type:"heading", text:"The Claude API — Your AI Brain" },
    { type:"prose", content:`You've used this already. But it's worth going deeper because how you structure the call makes a significant difference to output quality. The API is simple: system prompt sets the rules, user message is the input, Claude returns a response.` },
    { type:"code", content:`// The shape of every Claude API call you'll make
{
  "model": "claude-sonnet-4-6",      // Always use this model
  "max_tokens": 1024,                // Cap the response length
  "system": "Your directive here",   // The rules and context
  "messages": [
    {
      "role": "user",
      "content": "The actual input text: {{$json.email_body}}"
    }
  ]
}` },
    { type:"prose", content:`The parameters that actually matter:` },
    { type:"bullets", items:[
      "<strong>max_tokens:</strong> Caps how long the response can be. For a short email reply, 300 is plenty. For a full document summary, use 1500–2000. Higher costs more.",
      "<strong>temperature:</strong> Controls randomness (0 = deterministic, 1 = creative). For business workflows, use 0.2–0.4. You want consistency, not creativity.",
      "<strong>system:</strong> Your directive. This is the most important thing you write. It doesn't change between calls for the same workflow.",
      "<strong>messages:</strong> An array of turns. For most workflows, it's a single user message. For multi-turn flows, you include previous messages to give Claude context."
    ]},
    { type:"callout", content:`<strong>Prompt caching:</strong> If your system prompt is long and doesn't change between calls, Anthropic lets you cache it. You pay to process it once instead of on every request. At any real volume, this cuts costs significantly — worth setting up for client workflows.` },
    { type:"heading", text:"Supabase — Your Database" },
    { type:"prose", content:`Supabase is your database. PostgreSQL under the hood, but you interact with it through a clean dashboard and a REST API that n8n can call directly. You'll use it to log everything workflows process, store client data, and keep configuration that workflows read at runtime.` },
    { type:"bullets", items:[
      "<strong>Tables:</strong> Think of them like spreadsheets. Each row is a record. Each column is a field. A 'contacts' table might have columns: id, name, email, enquiry_type, reply_sent, created_at.",
      "<strong>Row Level Security (RLS):</strong> Controls who can read/write which rows. Enable it on every table and write policies. It prevents workflows or users from accessing data they shouldn't.",
      "<strong>Supabase client in n8n:</strong> Use the HTTP Request node to call Supabase's REST API. Or use the Postgres node and connect directly with your database credentials.",
      "<strong>Real-time subscriptions:</strong> Supabase can fire a webhook when a row is inserted or updated. Use this as a workflow trigger — e.g., when a new contact is added, start an onboarding sequence.",
      "<strong>Edge Functions:</strong> Serverless functions you can deploy to Supabase. Useful for more complex logic that n8n isn't ideal for."
    ]},
    { type:"svg-img", svg:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" style="width:100%;height:auto;display:block;background:#0e0a09">\n  <!-- header row -->\n  <rect x="20" y="20" width="680" height="32" rx="4" fill="#1a1412"/>\n  <text x="40" y="41" fill="#a09890" font-family="monospace" font-size="11" font-weight="700">id</text>\n  <text x="100" y="41" fill="#a09890" font-family="monospace" font-size="11" font-weight="700">name</text>\n  <text x="220" y="41" fill="#a09890" font-family="monospace" font-size="11" font-weight="700">email</text>\n  <text x="390" y="41" fill="#a09890" font-family="monospace" font-size="11" font-weight="700">enquiry_type</text>\n  <text x="530" y="41" fill="#a09890" font-family="monospace" font-size="11" font-weight="700">status</text>\n  <text x="620" y="41" fill="#a09890" font-family="monospace" font-size="11" font-weight="700">created_at</text>\n  <!-- rows -->\n  <rect x="20" y="56" width="680" height="28" rx="0" fill="#130f0e"/>\n  <text x="40" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">001</text>\n  <text x="100" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">Sarah M.</text>\n  <text x="220" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">sarah@email.com</text>\n  <text x="390" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">BOOKING</text>\n  <rect x="527" y="62" width="44" height="14" rx="3" fill="#e8735a22"/>\n  <text x="549" y="73" text-anchor="middle" fill="#e8735a" font-family="monospace" font-size="9" font-weight="700">sent</text>\n  <text x="620" y="74" fill="#a09890" font-family="monospace" font-size="10">2 mins ago</text>\n  <rect x="20" y="84" width="680" height="28" fill="#1a1412"/>\n  <text x="40" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">002</text>\n  <text x="100" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">James T.</text>\n  <text x="220" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">james@co.co.uk</text>\n  <text x="390" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">GENERAL</text>\n  <rect x="527" y="90" width="44" height="14" rx="3" fill="#e8735a22"/>\n  <text x="549" y="101" text-anchor="middle" fill="#e8735a" font-family="monospace" font-size="9" font-weight="700">sent</text>\n  <text x="620" y="102" fill="#a09890" font-family="monospace" font-size="10">14 mins ago</text>\n  <rect x="20" y="112" width="680" height="28" fill="#130f0e"/>\n  <text x="40" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">003</text>\n  <text x="100" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">Priya K.</text>\n  <text x="220" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">priya@health.io</text>\n  <text x="390" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">BILLING</text>\n  <rect x="523" y="118" width="52" height="14" rx="3" fill="#22d4a015"/>\n  <text x="549" y="129" text-anchor="middle" fill="#22d4a0" font-family="monospace" font-size="9" font-weight="700">pending</text>\n  <text x="620" y="130" fill="#a09890" font-family="monospace" font-size="10">1 hr ago</text>\n  <text x="360" y="178" text-anchor="middle" fill="#a09890" font-family="monospace" font-size="10">Supabase log — every enquiry processed, classified, and timestamped automatically</text>\n</svg>', caption:"Supabase table — every workflow run logged as a row. Queryable, filterable, exportable." },
    { type:"heading", text:"Resend — Email Delivery" },
    { type:"prose", content:`Resend is just the best option for this. Clean API, solid deliverability, free tier that covers everything you need for your first few clients.` },
    { type:"code", content:`// Sending an email via Resend API (in n8n HTTP Request node)
POST https://api.resend.com/emails

  "to": ["{{ $json.customer_email }}"],

    { type:"prose", content:`<strong>Important:</strong> For client projects, use a subdomain they own for sending (e.g., noreply@clientbusiness.com). This protects their domain reputation and makes it look professional. Set up DNS records (SPF, DKIM) in Resend — it's a 5-minute process.` },
    { type:"heading", text:"Tally — Forms as Triggers" },

    { type:"prose", content:`Vercel is where anything web-facing lives. Client dashboards, custom API endpoints, portfolio site. The free tier is more than enough until you're doing serious volume.` },

// ─── 4: DATA AND CONTEXT ─────────────────────────────────────────────────────
{
  badge:"Module 4 · Foundations", title:"Data, Context & Making AI Smarter", readTime:"16 min",
  subtitle:"How to feed AI the right information so it produces outputs worth using.",
  sections:[
    { type:"heading", text:"The Context Window" },
    { type:"prose", content:`The context window is everything Claude can see at once — system prompt, input data, conversation history, any documents you pass in. Sonnet 4.6's limit is 200k tokens, which is roughly 150,000 words. You're not going to hit it. Don't worry about it.` },
    { type:"prose", content:`What matters is <strong>what's actually in there.</strong> Claude cannot use information it can't see. Obvious when stated, but easy to forget when building. If you want it to reference the client's name, the name has to be in the prompt. Better context in, better output out — every time.` },
    { type:"heading", text:"How to Structure Input Data" },
    { type:"prose", content:`Dumping raw text into a prompt and hoping Claude figures it out works sometimes. Structured, labelled input works reliably. There's a big difference.` },
    { type:"two-col", items:[
      { title:"❌ Unstructured (Bad)", body:"'john smith called about his invoice being wrong the invoice number was 1042 and he paid £200 but the invoice says £250 he is annoyed'" },
      { title:"✅ Structured (Good)", body:"'Customer Name: John Smith<br>Issue Type: Billing dispute<br>Invoice Number: 1042<br>Amount Paid: £200<br>Invoice Amount: £250<br>Customer Sentiment: Frustrated'" }
    ]},
    { type:"prose", content:`Add a Code node before any AI step that does nothing but clean and structure the input. It's five minutes of work that makes outputs noticeably better.` },
    { type:"heading", text:"Giving AI a Knowledge Base" },
    { type:"prose", content:`Claude needs business-specific knowledge to be useful for a client. There are three ways to get it there, and which one you use depends on how much there is and how often it changes.` },
    { type:"bullets", items:[
      "<strong>In the system prompt (best for small, stable info):</strong> If the knowledge base is under ~5,000 words and doesn't change often, put it directly in the system prompt. Easy to update, always available. Clinic hours, service list, FAQ answers, team names.",
      "<strong>Retrieved from Supabase (best for large or dynamic info):</strong> Query the database at workflow runtime and inject the results into the prompt. Use this for product catalogues, pricing tables, customer history, anything that changes. The n8n workflow fetches the relevant rows, formats them, and adds them to the context before calling Claude.",
      "<strong>Document in the prompt (for one-off analysis):</strong> Pass the full text of a document — a contract, a CV, an invoice — as part of the user message. Ask Claude to extract, summarise, or analyse it."
    ]},
    { type:"callout", content:`<strong>RAG:</strong> A more advanced version of the Supabase approach. You embed documents as vectors and retrieve only the relevant chunks at runtime rather than passing everything. You don't need this for 90% of client projects — it's worth knowing it exists but don't go down that rabbit hole until you're specifically building something that needs it.` },
    { type:"heading", text:"Handling Variable Input" },
    { type:"prose", content:`Real inputs are a mess. People leave fields blank, write novels instead of one-liners, copy-paste garbled text, reply to automated emails with 'thanks'. Your workflow sees all of it. Handle it before it reaches Claude.` },
    { type:"bullets", items:[
      "<strong>Always validate input before calling AI:</strong> Check that required fields exist. If an email body is empty, skip the AI call and log an error. Don't let Claude try to process nothing.",
      "<strong>Set defaults for missing fields:</strong> If the customer name wasn't captured, use 'there' as a fallback (Hi there, vs Hi [blank],). In n8n, use an IF node to check and set defaults.",
      "<strong>Trim and clean text:</strong> Remove extra whitespace, HTML tags from forwarded emails, email signatures that add noise. A Code node with a few lines of regex does this.",
      "<strong>Limit input length:</strong> Very long inputs can push you over context limits and cost more. Truncate input to the first 2,000 characters if you only need the beginning of an email."
    ]},
    { type:"heading", text:"Using Outputs as Inputs" },
    { type:"prose", content:`Chaining is where things get genuinely powerful. The output from one Claude step feeds directly into the next. Each step handles one job, but together they tackle something complex.` },
    { type:"example-card", title:"Chaining Example — Lead Qualification", body:"Step 1: Claude reads a contact form submission and outputs a JSON object: { 'urgency': 'high', 'budget_signal': 'mentioned £500/month', 'fit': 'good', 'reply_needed': true }<br><br>Step 2: n8n routes based on urgency. High-urgency leads go to a second Claude step that writes a personalised, high-effort reply. Low-urgency leads get a lighter template response.<br><br>Step 3: Both paths log to Supabase, and a Slack message is sent to the sales team for high-urgency leads." },
    { type:"tip-block", content:`<strong>Getting structured output from Claude:</strong> Tell it explicitly — 'Respond ONLY with a valid JSON object. No preamble, no explanation, no backticks.' Then parse it in a Code node: JSON.parse($json.content[0].text). If you're not explicit, it'll wrap the JSON in a sentence and break your parser.` },
  ],
  checklist:[
    "I understand what the context window is and why it matters",
    "I can restructure messy input data before passing it to Claude",
    "I know the 3 ways to give Claude a knowledge base and when to use each",
    "I can handle missing or variable fields in workflow inputs",
    "I can chain AI outputs as inputs to subsequent steps"
  ]
},

// ─── 5: TESTING AND RELIABILITY ──────────────────────────────────────────────
{
  badge:"Module 5 · Foundations", title:"Testing, Reliability & Maintenance", readTime:"15 min",
  subtitle:"How to build workflows that don't embarrass you in front of clients.",
  sections:[
    { type:"heading", text:"Why Testing is Everything" },
    { type:"prose", content:`90% reliability isn't a product — it's a problem waiting to happen. Nobody notices the nine times it works perfectly. They notice the one time it emails a customer something wrong. <strong>Your actual product is reliability. The AI is just how you achieve it.</strong>` },
    { type:"heading", text:"The 4 Stages of Testing" },
    { type:"numbered-list", items:[
      "<strong>Happy path testing:</strong> Test with clean, expected input. Make sure the basic flow works end to end. This is what most beginners stop at.",
      "<strong>Edge case testing:</strong> What if the email is empty? What if the customer writes in a different language? What if the form has a field missing? What if the input is unusually long? Test every 'what if' you can think of.",
      "<strong>Adversarial testing:</strong> Try to break it. Send rude messages. Send messages with no clear question. Send messages asking Claude to ignore its instructions. A good directive handles all of these without producing harmful or nonsensical output.",
      "<strong>Volume testing:</strong> Run 50+ real or realistic inputs through the workflow. Look for patterns in failures. If 3 out of 50 produce bad outputs, find what they have in common and fix the directive."
    ]},
    { type:"heading", text:"Building a Test Set" },
    { type:"prose", content:`Before you hand anything over, build a test set of 20–30 inputs — not cherry-picked ones, genuinely varied. Short messages, long ones, vague ones, aggressive ones, ones with missing fields. Run the whole workflow against all of them and read every output. This catches the things you didn't think to account for.` },
    { type:"tip-block", content:`<strong>Get real examples from the client.</strong> During scoping: 'Can you forward me 20 messages you typically receive?' This gives you a proper test set and means you've already proven it works on their actual data before anything goes live.` },
    { type:"heading", text:"Error Handling in n8n" },
    { type:"prose", content:`Without error handling, failures are invisible. The workflow just stops, the message goes unprocessed, and you find out when the client asks why a customer never got a reply. That's a bad day.` },
    { type:"bullets", items:[
      "<strong>Error workflow:</strong> In n8n, set an 'Error Workflow' in workflow settings. This is a separate workflow that runs when the main one fails. Have it send you a Telegram message or email with the error details.",
      "<strong>Try/Catch nodes:</strong> Wrap API calls in error handling. If the Claude API call fails (rate limit, timeout), catch the error and retry after 5 seconds. Most transient failures resolve on retry.",
      "<strong>Fallback outputs:</strong> If Claude produces an output that fails validation (e.g., it was supposed to return JSON but returned plain text), have a fallback path that handles this gracefully — logs the issue and routes to a human review queue.",
      "<strong>Dead letter queue:</strong> Any message that fails processing after retries gets written to a 'failed_messages' Supabase table. You can then review and reprocess manually. Nothing gets lost."
    ]},
    { type:"heading", text:"Monitoring in Production" },
    { type:"prose", content:`Once something's live, you need to actually know if it's working. Not 'assume it's working'. Know.` },
    { type:"bullets", items:[
      "<strong>Execution logs in n8n:</strong> Every run is logged. You can see what input came in, what each step produced, and whether it succeeded or failed. Check these daily for the first week after launch.",
      "<strong>Supabase audit table:</strong> Write a log entry for every workflow run — timestamp, input summary, output summary, success/failure, processing time. This gives you a business-level view of activity.",
      "<strong>Weekly summary:</strong> Build a second workflow that runs every Monday, queries the audit table, and emails you (and optionally the client) a summary: '127 enquiries processed this week. 2 failures. Average response time 3.2 seconds.' Clients love this — it makes the value visible.",
    ]},
    { type:"heading", text:"Maintaining and Updating Workflows" },
    { type:"prose", content:`Workflows aren't set-and-forget. The business changes — new prices, new staff, new services. Your system prompt becomes wrong and nobody notices until a client asks why the AI quoted old pricing. Stay on top of it.` },
    { type:"bullets", items:[
      "<strong>Version your prompts:</strong> When you update a system prompt, keep a copy of the old version with a date. If a change makes things worse, you can roll back.",
      "<strong>Schedule monthly reviews:</strong> Check the Supabase audit table for any uptick in failures. Read a sample of 10 recent outputs to make sure quality is still good. Takes 20 minutes.",
      "<strong>Notify clients of changes:</strong> If you update something significant, send a quick email: 'I've updated the workflow to include your new pricing. It's live now.' This is part of what they pay the retainer for.",
    ]},
    { type:"warning-block", content:`<strong>Never push changes directly to a live workflow.</strong> Copy it, make the change, test it against your test set, then push live. One bad update that fires wrong emails to 50 customers can end the client relationship overnight.` },
  ],
  checklist:[
    "I know all 4 stages of testing and apply them before any launch",
    "I always build a test set of 20+ inputs before going live",
    "I've set up n8n error workflows and understand dead letter queues",
    "I know how to monitor a live workflow using execution logs and Supabase",
    "I have a process for maintaining and updating workflows after launch"
  ]
},

// ─── 7: ADVANCED PATTERNS ────────────────────────────────────────────────────
{
  badge:"Module 7 · Building", title:"Advanced Patterns & Use Cases", readTime:"18 min",
  subtitle:"The workflow patterns that unlock higher-value client projects.",
  sections:[
    { type:"heading", text:"Pattern 1: Multi-Step Classification and Routing" },
    { type:"prose", content:`Instead of one AI step trying to handle every possible scenario, you classify first and then route. Each downstream handler has a focused directive for one specific case. The outputs are better and when something goes wrong, it's obvious why.` },
    { type:"example-card", title:"Use Case: Law Firm Enquiry Triage", body:"Step 1 (Classify): Claude reads the enquiry and outputs one of: PERSONAL_INJURY / EMPLOYMENT / FAMILY / PROPERTY / CRIMINAL / OTHER.<br><br>Step 2 (Route): n8n switch node sends each classification down a different path. Each path has a Claude step with a directive written specifically for that practice area — using relevant legal terminology, specific team member names, appropriate next steps.<br><br>Step 3 (Log + Reply): All paths converge, log to Supabase with the classification, and send the reply. The firm's team can filter their CRM by practice area." },
    { type:"heading", text:"Pattern 2: Human-in-the-Loop" },
    { type:"prose", content:`Not everything should fire automatically. For anything high-stakes — a complaint, a legal query, a sensitive customer situation — you want a human to see the draft before it goes out. This pattern keeps the human in control while still automating 80% of the work.` },
    { type:"bullets", items:[
      "Claude drafts a reply and writes it to a Supabase table with status: 'pending_review'",
      "A Slack message is sent to the review team with the draft and a link to approve or edit it",
      "The team member clicks Approve → a second n8n workflow fires, reads the draft, and sends it",
      "They can edit the draft in a simple web form before approving",
    ]},
    { type:"prose", content:`It also makes the sale easier. Clients who are nervous about AI emailing their customers on autopilot are much more comfortable when you say 'you approve every reply before it sends — AI just writes the first draft'.` },
    { type:"heading", text:"Pattern 3: Scheduled Reports and Digests" },
    { type:"prose", content:`Not everything needs a trigger. Some of the most useful workflows just run on a schedule — pull data, synthesise it, send a report. Clients love these because the value shows up in their inbox every week without them doing anything.` },
    { type:"example-card", title:"Use Case: Weekly Business Health Digest", body:"Trigger: n8n Schedule (Every Monday 9am)<br><br>Step 1: Query Supabase for last week's enquiry data (volume, types, response times)<br>Step 2: HTTP Request to their booking system API for appointment data<br>Step 3: Claude reads all the data and writes a 300-word executive summary: key metrics, notable trends, anything that needs attention<br>Step 4: Resend delivers a formatted HTML email report to the management team<br><br>Clients love this because it makes the value of the automation visible every week." },
    { type:"heading", text:"Pattern 4: Document Intelligence" },
    { type:"prose", content:`Businesses are buried in documents they don't have time to read properly. Anything that involves reading a PDF and pulling out the key bits is something a human hates doing and Claude is genuinely good at.` },
    { type:"bullets", items:[
      "<strong>Invoice processing:</strong> Receive invoice PDF by email → extract text → Claude identifies supplier, date, amount, line items → write to accounting Supabase table → flag anomalies",
      "<strong>CV screening:</strong> Job applicant submits CV → Claude scores against job requirements → outputs: match percentage, key strengths, concerns, recommended interview questions → logged and emailed to hiring manager",
      "<strong>Contract review:</strong> Upload contract → Claude identifies key clauses, payment terms, termination conditions, unusual provisions → summary emailed to the team before they sign",
    ]},
    { type:"callout", content:`<strong>Passing documents to Claude:</strong> For PDFs, you need to extract the text first (use a PDF parsing service or a Python Vercel function with PyPDF2). For Word docs, similar. Then pass the extracted text as part of the user message. Claude can handle very long documents within its context window.` },
    { type:"heading", text:"Pattern 5: CRM Enrichment" },
    { type:"prose", content:`Every time a new lead comes in, a workflow fires and builds a profile on them before anyone on your client's team has even opened the record.` },
    { type:"example-card", title:"Use Case: Sales Lead Enrichment", body:"Trigger: New row in Supabase contacts table<br><br>Step 1: Web search for the company name (using a search API)<br>Step 2: Claude reads the search results and extracts: company size estimate, industry, likely pain points, relevant news<br>Step 3: Claude generates 3 personalised conversation openers based on the enriched data<br>Step 4: All of this is written back to the contact record<br><br>The sales team opens a contact and already has research and opening lines ready." },
    { type:"heading", text:"Pattern 6: Multi-Channel Output" },
    { type:"prose", content:`One AI step, results going to five different places at once. This is how you make a workflow feel like it's doing a lot — because it is.` },
    { type:"bullets", items:[
      "Email reply sent to the customer",
      "Summary logged to Supabase",
      "High-urgency flag triggers a Slack alert to the team",
      "Weekly batch report pulled from the Supabase log",
      "Monthly invoice auto-generated from the activity log"
    ]},
    { type:"tip-block", content:`<strong>Patterns compound.</strong> First time you build a classification-routing workflow it takes a day. Second time, half a day. By the fifth client, it's two hours and you're barely thinking about it. That's the point — you're building a library of reusable systems, not starting from scratch each time.` },

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentModule = 0;
const completedModules = new Set();
const checklistState = {};

function initState() {
  modules.forEach((m, i) => { checklistState[i] = new Array(m.checklist.length).fill(false); });
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function buildNav() {
  const container = document.getElementById('navContainer');
  let moduleIndex = 0;
  NAV_STRUCTURE.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    sec.innerHTML = `<div class="nav-section-label">${section.label}</div>`;
    section.modules.forEach(idx => {
      const m = modules[idx];
      const item = document.createElement('div');
      item.className = 'nav-item' + (idx === 0 ? ' active' : '');
      item.dataset.module = idx;
      item.onclick = () => showModule(idx);
      const isStart = section.label === 'Start Here';
      item.innerHTML = `<div class="check" id="check-${idx}">${isStart ? '★' : idx}</div><div class="nav-label">${m.title}</div>`;
      sec.appendChild(item);
    });
    container.appendChild(sec);
  });
}

function updateNav() {
  modules.forEach((_, i) => {
    const item = document.querySelector(`[data-module="${i}"]`);
    const check = document.getElementById(`check-${i}`);
    if (!item || !check) return;
    item.classList.toggle('active', i === currentModule);
    item.classList.toggle('completed', completedModules.has(i));
    if (completedModules.has(i)) check.innerHTML = '✓';
    else if (i === 0) check.innerHTML = '★';
    else check.innerHTML = i;
  });
}

function updateProgress() {
  const done = completedModules.size;
  const total = modules.length;
  document.getElementById('progressFill').style.width = (done/total*100) + '%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} modules complete`;
}

function toggleSidebarDesktop() {
  document.querySelector('.shell').classList.toggle('sidebar-collapsed');
  // On mobile, also handle the fixed sidebar
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.toggle('open');
  }
}

// ─── COSTS TABLE ─────────────────────────────────────────────────────────────
function pill(color, label) {
  const map = { teal:'#e8735a', green:'#22d4a0', blue:'#7a9ab4', red:'#ff5a6a', amber:'#f0a030', muted:'#7a6560' };
  const clr = map[color] || color;
  return `<span class="s5-pill" style="color:${clr};background:${clr}18;border:1px solid ${clr}30">${label}</span>`;
}

function renderCostsTable() {
  const rows = [
    ['n8n Cloud Starter','Visual workflow builder — connects every tool together. This is where you build.','~£17/mo',pill('teal','Get this')],
    ['Claude API','The AI brain. Pennies for demos, £2–6/mo for a live client workflow at normal volume.','Pay as you go',pill('teal','Get this')],
    ['Supabase','Database. Logs runs, stores client data. Free tier handles first 3–4 clients fine.','Free',pill('green','Free')],
    ['Resend','Sends emails from workflows. 3,000/month on the free tier — won’t hit it early.','Free',pill('green','Free')],
    ['Tally.so','Form builder that fires a webhook on submit. Simplest way to create a trigger.','Free',pill('green','Free')],
    ['Vercel','Hosting and serverless functions. Dashboards, portfolio, custom API endpoints.','Free',pill('green','Free')],
    ['Custom domain','Not essential but worth it early. Makes you look real when pitching clients.','~£10/yr',pill('blue','Optional')],
    ['Make.com','Alternative to n8n. Fine tool, but pick one — n8n scales better long-term.','£9–16/mo',pill('red','Skip')],
    ['Zapier','More expensive and more limited than n8n. Not worth it.','£19+/mo',pill('red','Skip')],
    ['OpenAI API','Claude outperforms GPT-4o on document and text tasks — 90% of client work.','Pay as you go',pill('red','Skip')],
  ];
  const heads = ['Tool','What it does','Cost',''];
  const thead = heads.map(h => `<th>${h}</th>`).join('');
  const tbody = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');
  return `<div class="s5-wrap"><table class="s5-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderSection(s) {
  switch(s.type) {
    case 'heading': return `<h2 class="section-heading">${s.text}</h2>`;
    case 'img': return `<div class="mod-img-wrap"><img src="${s.src}" alt="${s.alt||''}" loading="lazy" onerror="this.parentElement.style.display='none'"><div class="mod-img-caption">${s.caption||''}</div></div>`;
    case 'svg-img': return `<div class="mod-img-wrap">${s.svg}<div class="mod-img-caption">${s.caption||''}</div></div>`;
    case 'prose': return `<p class="prose">${s.content}</p>`;
    case 'callout': return `<div class="callout">${s.content}</div>`;
    case 'tip-block': return `<div class="tip-block">${s.content}</div>`;
    case 'warning-block': return `<div class="warning-block">${s.content}</div>`;
    case 'bullets': {
      // If items use <strong>Term:</strong> format → style-5 table
      const isTermDef = s.items.length > 0 && s.items[0].startsWith('<strong>');
      if (isTermDef) {
        const rows = s.items.map(item => {
          // Split on first </strong> to get term and definition
          const termMatch = item.match(/^<strong>(.*?)<\/strong>:?\s*(.*)/s);
          if (termMatch) {
            return `<tr><td>${termMatch[1]}</td><td>${termMatch[2]}</td></tr>`;
          }
          return `<tr><td colspan="2">${item}</td></tr>`;
        }).join('');
        return `<div class="s5-wrap"><table class="s5-table"><tbody>${rows}</tbody></table></div>`;
      }
      // Otherwise: plain arrow list
      return `<ul class="bullet-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    }
    case 'numbered-list': {
      // Term:definition format (<strong>Term:</strong> desc) → style-5 table
      const isTermDef = s.items.length > 0 && s.items[0].match(/^<strong>[^<]+<\/strong>/);
      // But sequential steps (like "Add a Webhook...") aren't term:def even if bold
      const hasColon = s.items.length > 0 && s.items[0].match(/^<strong>[^<]+:<\/strong>/);
      if (hasColon) {
        const rows = s.items.map((item, idx) => {
          const termMatch = item.match(/^<strong>(.*?):?<\/strong>:?\s*(.*)/s);
          if (termMatch) {
            return `<tr><td>${termMatch[1]}</td><td>${termMatch[2]}</td></tr>`;
          }
          return `<tr><td>${idx+1}</td><td>${item}</td></tr>`;
        }).join('');
        return `<div class="s5-wrap"><table class="s5-table"><tbody>${rows}</tbody></table></div>`;
      }
      return `<ol class="numbered-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ol>`;
    }
    case 'example-card': return `<div class="example-card"><div class="example-card-title">${s.title}</div><p>${s.body||s.content||''}</p></div>`;
    case 'scenario-block': return `<div class="scenario-block"><div class="scenario-label">${s.label}</div><div class="scenario-title">${s.title}</div><div class="scenario-body">${s.body}</div></div>`;
    case 'code': return `<div class="code-block">${s.content}</div>`;
    case 'costs-table': return renderCostsTable();
    case 'gen-table': {
      const thead = s.headers.map(h => `<th>${h}</th>`).join('');
      const tbody = s.rows.map(r => {
        const tds = r.map((cell, ci) => {
          let content = cell;
          if (typeof cell === 'string' && cell.startsWith('!!')) {
            const parts = cell.slice(2).split(':');
            content = pill(parts[0], parts.slice(1).join(':'));
          }
          return `<td>${content}</td>`;
        }).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<div class="s5-wrap"><table class="s5-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
    }
    case 'two-col': return `<div class="two-col">${s.items.map(i=>`<div class="example-card"><div class="example-card-title">${i.title}</div><p>${i.body}</p></div>`).join('')}</div>`;
    default: return '';
  }
}

function showModule(idx) {
  currentModule = idx;
  const m = modules[idx];
  const isCompleted = completedModules.has(idx);
  const isLast = idx === modules.length - 1;

  const checklistHTML = m.checklist.map((text, ci) => {
    const done = checklistState[idx][ci];
    return `<div class="checklist-item ${done?'done':''}" data-check="${idx}-${ci}" onclick="toggleCheck(${idx},${ci})">
      <div class="checklist-box">${done?'✓':''}</div>
      <div class="checklist-text" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${text}</div>
    </div>`;
  }).join('');

  const prevBtn = idx > 0 ? `<button class="btn btn-secondary" onclick="showModule(${idx-1})">← Back</button>` : '';
  const ready = allChecked(idx);
  const nextBtn = !isLast ? `<button class="btn btn-primary" id="next-btn-${idx}" onclick="showModule(${idx+1})" ${ready?'':'disabled'} style="opacity:${ready?'1':'0.35'};cursor:${ready?'pointer':'not-allowed'}" title="${ready?'':'Tick all boxes before continuing'}">Next →</button>` : '';
  const completeBtn = isCompleted
    ? `<span class="completed-badge">✓ Completed</span>`
    : `<button class="btn btn-complete" onclick="markComplete(${idx})">✓ Mark Complete</button>`;

  document.getElementById('main').innerHTML = `
    <div class="module-meta">
      <span class="module-badge">${m.badge}</span>
      <span class="read-time">${m.readTime} read</span>
      ${isCompleted ? '<span class="completed-badge">✓ Done</span>' : ''}
    </div>
    <h1 class="module-title">${m.title}</h1>
    <p class="module-subtitle">${m.subtitle}</p>
    ${m.sections.map(renderSection).join('\n')}
    <div class="checklist-wrap">
      <div class="checklist-title">Before you move on</div>
      ${checklistHTML}
    </div>
    <div class="nav-footer">${prevBtn}${nextBtn}${completeBtn}</div>
  `;

  updateNav();
  window.scrollTo(0,0);
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function toggleCheck(mi, ci) {
  checklistState[mi][ci] = !checklistState[mi][ci];
  // Update just the clicked item without re-rendering the whole page
  const item = document.querySelector(`[data-check="${mi}-${ci}"]`);
  if (item) {
    const done = checklistState[mi][ci];
    item.classList.toggle('done', done);
    item.querySelector('.checklist-box').textContent = done ? '✓' : '';
    item.querySelector('.checklist-text').style.textDecoration = done ? 'line-through' : '';
    item.querySelector('.checklist-text').style.color = done ? 'var(--muted)' : '';
  }
  // Update next button state
  updateNextBtn(mi);
}

function allChecked(idx) {
  return checklistState[idx] && checklistState[idx].every(v => v);
}

function updateNextBtn(idx) {
  const btn = document.getElementById('next-btn-' + idx);
  if (!btn) return;
  const isLast = idx === modules.length - 1;
  if (isLast) return;
  const ready = allChecked(idx);
  btn.disabled = !ready;
  btn.style.opacity = ready ? '1' : '0.35';
  btn.style.cursor = ready ? 'pointer' : 'not-allowed';
  btn.title = ready ? '' : 'Tick all boxes before continuing';
}

function markComplete(idx) {
  completedModules.add(idx);
  updateProgress();
  showModule(idx);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initState();
buildNav();
showModule(0);
</script>
</body>
</html>
