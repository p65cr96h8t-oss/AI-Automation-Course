      "<strong>Add an HTTP Request node</strong> for the Claude API call. Method: POST. URL: https://api.anthropic.com/v1/messages. Add headers: Content-Type: application/json, x-api-key: YOUR_KEY, anthropic-version: 2023-06-01. Build the request body using the structured directive from Module 2.",
      "<strong>Add a Code node</strong> to extract Claude's reply from the response: const reply = $json.content[0].text",
      "<strong>Add a Supabase HTTP Request node</strong> to log the enquiry. POST to your Supabase table with: name, email, message, ai_reply, created_at, status: 'sent'.",
      "<strong>Add a Resend HTTP Request node</strong> to send the reply email. FROM: your sending address. TO: the form submitter's email. SUBJECT: 'Re: Your Enquiry'. BODY: Claude's reply.",

BUSINESS INFO:
[Paste key info here: services, pricing, location, hours, 
team names, FAQs — anything relevant]

FORMAT:

FALLBACK:

    { type:"heading", text:"How to Reskin This for Any Client in Under an Hour" },
    { type:"prose", content:`The enquiry handler is the foundation. Once it's built, every new client in a different industry is mostly a copy-and-edit job. Here's what actually changes between clients:` },

      "<strong>Code node (cleanup):</strong> Runs a few lines of JavaScript to extract the fields you need from the raw webhook payload, trim whitespace, and set defaults for any missing values. Keeps the next steps clean.",

// ─── 7: ADVANCED PATTERNS ────────────────────────────────────────────────────
{
  badge:"Module 7 · Building", title:"Advanced Patterns & Use Cases", readTime:"18 min",
  subtitle:"The workflow patterns that unlock higher-value client projects.",
  sections:[
    { type:"heading", text:"Pattern 1: Multi-Step Classification and Routing" },
    { type:"prose", content:`Instead of one AI step trying to handle every possible scenario, you classify first and then route. Each downstream handler has a focused directive for one specific case. The outputs are better and when something goes wrong, it's obvious why.` },
    { type:"example-card", title:"Use Case: Law Firm Enquiry Triage", body:"<strong>Step 1</strong> (Classify): Claude reads the enquiry and outputs one of: PERSONAL_INJURY / EMPLOYMENT / FAMILY / PROPERTY / CRIMINAL / OTHER.<br><br><strong>Step 2</strong> (Route): n8n switch node sends each classification down a different path. Each path has a Claude step with a directive written specifically for that practice area — using relevant legal terminology, specific team member names, appropriate next steps.<br><br><strong>Step 3</strong> (Log + Reply): All paths converge, log to Supabase with the classification, and send the reply. The firm's team can filter their CRM by practice area." },
    { type:"heading", text:"Pattern 2: Human-in-the-Loop" },
    { type:"prose", content:`Not everything should fire automatically. For anything high-stakes — a complaint, a legal query, a sensitive customer situation — you want a human to see the draft before it goes out. This pattern keeps the human in control while still automating 80% of the work.` },
    { type:"bullets", items:[
      "Claude drafts a reply and writes it to a Supabase table with status: 'pending_review'",
      "A Slack message is sent to the review team with the draft and a link to approve or edit it",
      "The team member clicks Approve → a second n8n workflow fires, reads the draft, and sends it",
      "They can edit the draft in a simple web form before approving",
    ]},
    { type:"prose", content:`It also makes the sale easier. Clients who are nervous about AI emailing their customers on autopilot are much more comfortable when you say 'you approve every reply before it sends — AI just writes the first draft'.` },
    { type:"heading", text:"Pattern 3: Scheduled Reports and Digests" },
    { type:"prose", content:`Not everything needs a trigger. Some of the most useful workflows just run on a schedule — pull data, synthesise it, send a report. Clients love these because the value shows up in their inbox every week without them doing anything.` },
    { type:"example-card", title:"Use Case: Weekly Business Health Digest", body:"Trigger: n8n Schedule (Every Monday 9am)<br><br><strong>Step 1</strong>: Query Supabase for last week's enquiry data (volume, types, response times)<br><strong>Step 2</strong>: HTTP Request to their booking system API for appointment data<br><strong>Step 3</strong>: Claude reads all the data and writes a 300-word executive summary: key metrics, notable trends, anything that needs attention<br><strong>Step 4</strong>: Resend delivers a formatted HTML email report to the management team<br><br>Clients love this because it makes the value of the automation visible every week." },
    { type:"heading", text:"Pattern 4: Document Intelligence" },
    { type:"prose", content:`Businesses are buried in documents they don't have time to read properly. Anything that involves reading a PDF and pulling out the key bits is something a human hates doing and Claude is genuinely good at.` },
    { type:"bullets", items:[
      "<strong>Invoice processing:</strong> Receive invoice PDF by email → extract text → Claude identifies supplier, date, amount, line items → write to accounting Supabase table → flag anomalies",
      "<strong>CV screening:</strong> Job applicant submits CV → Claude scores against job requirements → outputs: match percentage, key strengths, concerns, recommended interview questions → logged and emailed to hiring manager",
      "<strong>Contract review:</strong> Upload contract → Claude identifies key clauses, payment terms, termination conditions, unusual provisions → summary emailed to the team before they sign",
    ]},
    { type:"callout", content:`<strong>Passing documents to Claude:</strong> For PDFs, you need to extract the text first (use a PDF parsing service or a Python Vercel function with PyPDF2). For Word docs, similar. Then pass the extracted text as part of the user message. Claude can handle very long documents within its context window.` },
    { type:"heading", text:"Pattern 5: CRM Enrichment" },
    { type:"prose", content:`Every time a new lead comes in, a workflow fires and builds a profile on them before anyone on your client's team has even opened the record.` },
    { type:"example-card", title:"Use Case: Sales Lead Enrichment", body:"Trigger: New row in Supabase contacts table<br><br><strong>Step 1</strong>: Web search for the company name (using a search API)<br><strong>Step 2</strong>: Claude reads the search results and extracts: company size estimate, industry, likely pain points, relevant news<br><strong>Step 3</strong>: Claude generates 3 personalised conversation openers based on the enriched data<br><strong>Step 4</strong>: All of this is written back to the contact record<br><br>The sales team opens a contact and already has research and opening lines ready." },
    { type:"heading", text:"Pattern 6: Multi-Channel Output" },
    { type:"prose", content:`One AI step, results going to five different places at once. This is how you make a workflow feel like it's doing a lot — because it is.` },
    { type:"bullets", items:[
      "Email reply sent to the customer",
      "Summary logged to Supabase",
      "High-urgency flag triggers a Slack alert to the team",
      "Weekly batch report pulled from the Supabase log",
      "Monthly invoice auto-generated from the activity log"
    ]},
    { type:"tip-block", content:`<strong>Patterns compound.</strong> First time you build a classification-routing workflow it takes a day. Second time, half a day. By the fifth client, it's two hours and you're barely thinking about it. That's the point — you're building a library of reusable systems, not starting from scratch each time.` },
    { type:"heading", text:"Pattern 7: Feedback Loop Workflows" },
    { type:"prose", content:`A feedback loop workflow gets smarter over time. Instead of just running and logging, it feeds outcomes back into the system to improve future runs.` },
    { type:"example-card", title:"Use Case: Reply Quality Improvement", body:"When a client reviews and edits an AI-drafted reply before sending, the workflow logs the original draft and the edited version. Every week, a scheduled workflow queries Supabase for all edited replies, passes them to Claude with the instruction 'Identify what patterns in the original drafts led to edits. Suggest improvements to the system prompt.' The suggested improvements go to a human reviewer. Over time, the workflow's drafts need fewer corrections." },
    { type:"heading", text:"Pattern 8: Multi-Agent Pipelines" },
    { type:"prose", content:`Multi-agent pipelines use several Claude calls in sequence, each with a different role. The output of one agent becomes the input to the next. This separates concerns and dramatically improves accuracy on complex tasks.` },
    { type:"bullets", items:[
      "<strong>Agent 1 — Extract:</strong> Read the raw input and pull out structured data. Output JSON. No interpretation yet.",
      "<strong>Agent 2 — Classify:</strong> Take the structured data and assign it to a category. One word output. Nothing else.",
      "<strong>Agent 3 — Enrich:</strong> Based on the classification, look up relevant context from Supabase (e.g., the right pricing info for this enquiry type).",
      "<strong>Agent 4 — Respond:</strong> Using the extracted data, classification, and enriched context, write the actual reply. Now Claude has exactly the right information in exactly the right format.",
    ]},
    { type:"prose", content:`Each agent has a tiny, focused directive. Each one is independently testable. When something goes wrong, you can isolate exactly which agent failed and why.` },
    { type:"heading", text:"When to Use Agentic vs Reactive Patterns" },
    { type:"prose", content:`Reactive workflows are triggered by events and run to completion in a linear sequence. Agentic workflows loop — the AI decides whether it's done or needs to take another action. Choose based on the task:` },
    { type:"bullets", items:[
      "<strong>Use reactive for:</strong> Enquiry handling, document processing, scheduled reports, data logging. Predictable, fast, easy to debug.",
      "<strong>Use agentic for:</strong> Research tasks, lead enrichment (search → assess → search more → compile), anything where the number of steps depends on what the AI finds.",
      "<strong>Agentic risk:</strong> Without hard loop limits, agents can run indefinitely and rack up API costs. Always set a maximum iteration count and a fallback exit condition.",
    ]},
  ],
  checklist:[
    "I understand the multi-step classification and routing pattern",
    "I can explain human-in-the-loop and when to use it",
    "I know how to build a scheduled report workflow",
    "I understand how to pass documents to Claude for processing",
    "I can describe at least 2 use cases for each pattern",
    "I understand feedback loop workflows and multi-agent pipelines",
    "I know when to use reactive vs agentic architecture"
  ]
},

// ─── 9: PRICING AND PACKAGING ────────────────────────────────────────────────
{
  badge:"Module 9 · Selling", title:"Pricing, Packaging & Proposals", readTime:"16 min",
  subtitle:"What to charge, how to package it, and why the way you present it matters as much as the price.",
  sections:[
    { type:"heading", text:"The Fundamental Pricing Principle" },
    { type:"prose", content:`<strong>Charge for outcomes, not hours.</strong> Hourly pricing actively punishes you for getting better. When you go from taking 10 hours to taking 2 hours, you earn 80% less for the same result. The client's life changed the same amount either way.` },
    { type:"prose", content:`The client doesn't care if it took you 4 hours or 40. They care that they're no longer spending 2 hours a day on manual replies. Anchor the price to that outcome, not your calendar.` },
    { type:"heading", text:"The 3 Pricing Models" },
    { type:"scenario-block", label:"Model 1", title:"One-Time Project Fee", body:"You build a specific workflow for a flat fee. Good for your first 2-3 clients while you're still building confidence and portfolio. Client pays once, you deliver, relationship may or may not continue.<br><br><strong>Pricing: £300–£1,500 depending on complexity.</strong> Simple enquiry handler: £300–500. Multi-step classification system: £600–1,000. Full document processing pipeline: £1,000–1,500.<br><br><strong>Problem:</strong> No recurring revenue. You have to keep finding new clients to maintain income. Not a long-term model." },
    { type:"scenario-block", label:"Model 2 — Recommended", title:"Build Fee + Monthly Retainer", body:"You charge a one-time build fee to set up the workflow, then a monthly retainer to maintain, monitor, update, and support it. This is the right model.<br><br><strong>Build fee: £400–1,000.</strong> Retainer: £150–400/month.<br><br>What the retainer covers: monthly prompt optimisation, fixing issues, adding minor features, monitoring execution logs, updating business info when it changes, quarterly reviews.<br><br><strong>Reality check:</strong> Once a workflow is running smoothly, you spend 2–4 hours/month on it. At £200/month, that's £50–100/hr effective rate. 5 clients = £1,000/month recurring, maybe 15 hours of work." },
    { type:"scenario-block", label:"Model 3 — Advanced", title:"ROI-Based Pricing", body:"You charge a percentage of the value you demonstrably create. Requires case studies and a track record. Pitch: 'This workflow will save your team 20 hours a month. At your billing rate, that's £1,500 in recaptured time. I charge £400/month — a 3.75x return.'<br><br>Hard to use early on. Revisit once you have 3+ satisfied clients and real numbers to point to." },
    { type:"heading", text:"Your Pricing Journey" },
    { type:"callout", content:`<strong>Client 1:</strong> Free or £200 flat. Your goal is the case study, not the money.<br><strong>Client 2:</strong> £400 build + £150/month retainer.<br><strong>Client 3:</strong> £600 build + £200/month retainer.<br><strong>Client 4+:</strong> £800–1,000 build + £250–400/month retainer.<br><br>Each client is more expensive because you have more proof. Your confidence goes up. Your portfolio grows. Your price follows.` },
    { type:"heading", text:"Scoping a Project" },
    { type:"prose", content:`Scope creep is how you end up doing three weeks of work for a one-week quote. Get specific before you name a number — and then write down what's explicitly not included.` },
    { type:"bullets", items:[
      "<strong>Define the inputs:</strong> What triggers the workflow? What data comes in? What format?",
      "<strong>Define the AI job:</strong> Exactly what will Claude do? One sentence.",
      "<strong>Define the outputs:</strong> What gets sent, logged, or created? Where does it go?",
      "<strong>Define the scope boundary:</strong> What is explicitly NOT included? A different trigger source, additional output destinations, a second workflow — all out of scope unless quoted separately.",
      "<strong>Define the handover:</strong> What do they get? A working n8n workflow, a Loom walkthrough, 30 days of support for bug fixes."
    ]},
    { type:"heading", text:"Writing a Proposal That Closes" },
    { type:"prose", content:`One page. If you can't fit it in one page, you haven't scoped it tightly enough. A 12-page proposal doesn't signal thoroughness — it signals that you're not sure what you're building.` },
    { type:"example-card", title:"One-Page Proposal Structure", body:"<strong>The problem (2-3 sentences):</strong> Repeat back what they told you in their words. This shows you listened and understand their situation.<br><br><strong>What I'll build (3-5 bullets):</strong> Specific, concrete, no jargon. 'A Tally form that captures enquiries' not 'an integrated multi-channel intake solution'.<br><br><strong>What you get (2-3 bullets):</strong> Working workflow live on their system. Loom video walkthrough. 30 days of bug-fix support.<br><br><strong>Investment:</strong> £X build fee + £X/month retainer. One clear number. No ranges.<br><br><strong>Next step:</strong> 'If this looks right, I'll send a simple agreement and we can start this week.'" },
    { type:"tip-block", content:`<strong>Add a time anchor at the end.</strong> Something like: 'I've got capacity to start in the next couple of weeks — happy to hold that slot.' It's not pressure, it's just a natural way to move things forward.` },
    { type:"heading", text:"How to Handle Pushback on Price" },
    { type:"prose", content:`Price objections aren't rejections — they're requests for more justification. Here's how to respond to the most common ones without discounting.` },
    { type:"bullets", items:[
      "<strong>'That's a lot for software.'</strong> 'It's not really software — it's a system I build and maintain specifically for your business. The build includes all the setup, testing, and configuration. The retainer keeps it running and updated.' Reframe it as a service, not a product.",
      "<strong>'We'll pay for it if it works.'</strong> 'I completely understand wanting proof first. The demo I'll show you on the call uses your actual enquiry types — that's the closest thing to live proof without building the full system. If you want to start small, I can scope a reduced first phase.' Offer scope reduction, not a success-based fee.",
      "<strong>'Our budget is £X [lower than your quote].'</strong> 'I can work within that if we reduce the scope. The most valuable part of what I'm proposing is [the enquiry automation / the lead follow-up / etc.]. I can build just that first, and we can expand later once you've seen the return.' Reduce scope, not price.",
      "<strong>'Can we pay monthly instead of upfront?'</strong> Occasional exception for established businesses. But make clear: 'I'll need the first month upfront before I start, then monthly from there. That covers my time while the build is in progress.'",
    ]},
    { type:"heading", text:"Structuring Contracts and Agreements" },
    { type:"prose", content:`For your first few clients a simple Google Doc works. As you scale, get a proper service agreement. Here's what every agreement needs to cover:` },
    { type:"bullets", items:[
      "<strong>Scope definition:</strong> Exactly what you're building. Be specific. 'An n8n workflow that processes Tally form submissions, generates AI replies via the Anthropic API, sends them via Resend, and logs to Supabase.' Not 'AI automation system'.",
      "<strong>Deliverables:</strong> Working workflow live in their environment, Loom walkthrough video, 30 days of bug-fix support.",
      "<strong>Out of scope:</strong> List what you're explicitly not including. 'Integration with [their existing CRM] is out of scope for this engagement.'",
      "<strong>Payment terms:</strong> 50% upfront, 50% on delivery. Net 14 days for invoices.",
      "<strong>IP ownership:</strong> They own the workflows you build for them. You retain the right to reuse the patterns and techniques (not their specific business logic) for other clients.",
      "<strong>Retainer terms:</strong> What's included monthly, what's billed additionally, 30-day notice to cancel.",
    ]},
  ],
  checklist:[
    "I understand why hourly pricing is wrong for this business model",
    "I can explain all 3 pricing models and know which to use at my stage",
    "I know what my prices will be for my first 4 clients",
    "I can scope a project completely before quoting (inputs, AI job, outputs, boundary)",
    "I can write a one-page proposal structure from memory",
    "I can handle all 4 common price objections without discounting",
    "I know what a service agreement needs to cover"
  ]
},

// ─── 10: SALES CONVERSATIONS ─────────────────────────────────────────────────
{
  badge:"Module 10 · Selling", title:"The Sales Conversation", readTime:"17 min",
  subtitle:"How to run a discovery call, pitch in 60 seconds, handle objections, and close — without feeling like a salesperson.",
  sections:[
    { type:"heading", text:"The Wrong Way to Think About Sales" },
    { type:"prose", content:`Most people hate selling because they think it means pushing something on someone. That's not what this is. <strong>Think of it as diagnosis.</strong> You ask questions, figure out if there's a real problem, and if your solution fits you say so. If it doesn't, you say that too. There's nothing uncomfortable about that.` },
    { type:"prose", content:`It also protects you. Honest diagnosis means you naturally walk away from bad fits instead of convincing yourself a project will work when it won't.` },
    { type:"heading", text:"The Discovery Call — What to Ask" },
    { type:"prose", content:`The discovery call is not a pitch. Don't go in with a deck. Go in with questions and actually listen — most people tell you exactly what they need within the first few minutes if you give them space.` },
    { type:"numbered-list", items:[
      "<strong>'Tell me a bit about the business — what do you do and who do you serve?'</strong> Let them talk. You're learning context and building rapport.",
      "<strong>'What does a typical week look like for your team?'</strong> Surfaces daily operations. Listen for the word 'always', 'constantly', 'every week' — these signal repetitive tasks.",
      "<strong>'What are the things that eat up the most time that don't really require your specific expertise?'</strong> Direct shot at the automation opportunity.",
      "<strong>'What happens when those things don't get done, or get done slowly?'</strong> Quantifies the pain. 'Leads go cold.' 'Customers complain.' 'We lose bookings.' These become the ROI argument.",
      "<strong>'Have you tried to solve this before? What happened?'</strong> Tells you what's been attempted, why it failed, and what they're cautious about.",
      "<strong>'If this was running automatically without anyone touching it — what would your team do with that time?'</strong> Gets them to articulate the value themselves. Much more powerful than you telling them."
    ]},
    { type:"callout", content:`<strong>The mirror technique:</strong> At the end of the discovery section, feed everything back to them: 'So what I'm hearing is — you're handling around 50 enquiries a week, your team spends about 2 hours a day on replies, and because of delays some leads go cold before you get to them. Is that right?' When they say yes, you've done most of the selling. The problem is now vivid and confirmed.` },
    { type:"heading", text:"The 60-Second Pitch" },
    { type:"prose", content:`Once the problem is established, the pitch is short. Don't talk about Claude, n8n, or any of the technology. Describe what life looks like when it's working.` },
    { type:"example-card", title:"The Pitch Structure", body:"'What I do is build systems that handle [the specific problem they described] automatically. So in your case — every enquiry that comes in gets an immediate personalised reply, the conversation gets logged, and your team gets notified if anything needs human attention. You get all the replies handled, without your team touching them.<br><br>I'd build this for you for [£X], and I could have it running within [X] weeks. I'd also maintain and monitor it monthly, so if anything needs updating — new pricing, new services — I handle that.<br><br>The best way to understand if it's right for you is to see it in action — I've built something similar for [type of business]. Can I show you a quick demo?'" },
    { type:"heading", text:"The Demo — Your Best Weapon" },
    { type:"prose", content:`A live demo beats any proposal. Build a version of the enquiry handler for their industry before the call — use their actual business name in the system prompt if you can find it. Have it ready to go.` },
    { type:"prose", content:`During the call, ask them for a real example. Paste it into the form while they're watching. Thirty seconds later a reply lands. That moment does more selling than anything you could say.` },
    { type:"heading", text:"Handling Every Objection" },
    { type:"bullets", items:[
      "<strong>'How do I know it'll work for us?'</strong> 'Fair question. That's exactly what the demo is for. Tell me a typical message your team receives and let's test it right now.'",
      "<strong>'It sounds expensive.'</strong> 'What's your team's hourly cost? [They answer.] At [their rate], automating [X] hours a month pays this back in [Y] months. Most clients are ROI-positive in the first quarter.'",
      "<strong>'We already have a system.'</strong> 'What does that look like?' [Listen.] 'Most of the time when I hear that, it's actually someone on the team doing it manually — which is a system, but not an efficient one. Is that roughly what's happening?'",
      "<strong>'I need to think about it.'</strong> 'Of course. What's the main thing you'd want to think through? If it's the cost, I'm happy to talk through the ROI in more detail. If it's whether it'll actually work, that's what the demo is for.' [Find the real objection.]",
      "<strong>'We tried something like this before and it didn't work.'</strong> 'That's really helpful to know. What went wrong?' [Listen.] 'The most common reason these fail is vague instructions to the AI, or no human review process. Here's how I'd handle that...'",
      "<strong>'Can you do it cheaper?'</strong> 'I can look at scoping something smaller to fit a lower budget — what would be the single most valuable thing to automate?' [Reduce scope, not price per unit of value.]"
    ]},
    { type:"heading", text:"After They Say Yes — The Process" },
    { type:"numbered-list", items:[
      "Send a brief written summary of what was agreed — scope, price, timeline. A Google Doc is fine.",
      "Invoice for 50% upfront before starting. Non-negotiable. Anyone serious will pay it.",
      "Build in your test environment. Don't deploy to their live systems until fully tested.",
      "Deliver 1-2 days early if possible. Clients remember this.",
      "Record a Loom walkthrough when you hand over — shows how it works, how to check the logs, what to do if something seems wrong.",
      "Check in at 2 weeks: 'How's it running? Anything you'd like adjusted?' This is your retainer conversation — if they love it, ask about ongoing support."
    ]},
    { type:"tip-block", content:`<strong>The retainer conversation at 2 weeks:</strong> 'Now you can see it running — it'll need occasional tweaks as things change. New pricing, seasonal stuff, new services. I offer a maintenance package for £[X]/month that covers all of that and means you've got a direct line to me if anything needs attention. Want to add that on?'` },
    { type:"heading", text:"Reading the Room: Signals That Tell You Where You Stand" },
    { type:"prose", content:`In a sales conversation, what people don't say is as important as what they do. Learn to read these signals:` },
    { type:"bullets", items:[
      "<strong>Positive signal — specificity:</strong> When they start asking specific questions ('Would it work with our Gmail?', 'Can it handle French enquiries?'), they're mentally implementing it. Answer specifically. Don't pivot back to benefits.",
      "<strong>Positive signal — numbers:</strong> When they start quantifying ('We get about 40 messages a week', 'My VA costs me £15/hr'), they're doing the ROI calculation themselves. Let them finish it.",
      "<strong>Negative signal — vagueness:</strong> If answers stay abstract ('Yeah we have lots of messages', 'It could be useful') despite your questions, the pain isn't strong enough yet. Ask more specific quantifying questions before pitching.",
      "<strong>Negative signal — consensus language:</strong> 'I'd need to discuss it with my team / partner / manager' early in the conversation usually means the budget holder isn't in the room. Ask: 'Would it make sense to get them on a quick call so I can answer their questions directly?'",
      "<strong>Buying signal — future language:</strong> When they shift from 'would' to 'will' — 'This will save us time', 'We'll be able to focus on X' — they've mentally bought it. Stop selling and start discussing next steps.",
    ]},
    { type:"heading", text:"Following Up Without Being Annoying" },
    { type:"prose", content:`Most deals don't close on the first call. Here's a follow-up sequence that moves things forward without feeling pushy:` },
    { type:"bullets", items:[
      "<strong>24 hours after the call:</strong> Send a brief email with a 2-sentence summary of what was discussed and the proposal attached. 'Great to chat earlier — I've attached the proposal based on what we covered. Happy to answer any questions.'",
      "<strong>5 days later (no reply):</strong> One sentence. 'Just checking this didn't get buried — any questions on the proposal?' Nothing more.",
      "<strong>10 days later (still no reply):</strong> Add value. 'I've been thinking about your [specific problem they mentioned] — one thing I didn't mention that might be relevant is [insight]. Worth a quick call if you're still considering it?'",
      "<strong>After that:</strong> Move on. Put them in a 90-day re-engagement list. Circumstances change. A follow-up in 3 months catches people who weren't ready before.",
    ]},
  ],
  checklist:[
    "I have all 6 discovery questions memorised",
    "I can deliver the 60-second pitch without looking at notes",
    "I have a demo version of the enquiry handler ready to show",
    "I have confident responses to all 6 common objections",
    "I know the exact post-close process from agreement to retainer ask",
    "I can read positive and negative buying signals during a conversation",
    "I have a follow-up sequence mapped out for non-reply prospects"
  ]
},

// ─── 10: GROWTH ──────────────────────────────────────────────────────────────
{
  badge:"Module 11 · Selling", title:"Growing the Business", readTime:"15 min",
  subtitle:"How to go from first client to consistent income — and what to do when you're there.",
  sections:[
    { type:"heading", text:"The First 90 Days" },
    { type:"month-cards", items:[
      { month:"Month 1", goal:"First paying client", body:"Get one paying client. Not the right client. Not the ideal client. Just a real one. You'll learn more from scoping, building, and delivering one actual project than you will from three months of preparation." },
      { month:"Month 2", goal:"Case study + second client", body:"Second client and a case study from the first. A case study doesn't need to be elaborate — two paragraphs covering the problem, what you built, and a concrete result. 'Response time went from 2 days to 8 seconds. Owner reckons they're recapturing 3 leads a week that used to go cold.' Done." },
      { month:"Month 3", goal:"Repeatable process", body:"Third client and a repeatable process. By this point you've built the same core thing three times in different clothes. You have templates, a scoping doc, a test checklist. New projects stop feeling like starting from scratch." },
    ]},
    { type:"heading", text:"Getting Referrals" },
    { type:"prose", content:`Referrals close at a completely different rate to cold outreach. The prospect already trusts you before you've said a word — because someone they trust said you're worth talking to.` },
    { type:"bullets", items:[
      "<strong>Ask at handover:</strong> 'If this goes well, do you know anyone else in [industry] who has similar challenges? I'd be happy to have a conversation with them.'",
      "<strong>Ask at the 2-week check-in:</strong> After they've seen it working and they're happy — that's the best moment to ask. The value is fresh in their mind.",
      "<strong>Make it easy:</strong> Write a 2-sentence email template they can forward. 'I've been working with [your name] on automating our enquiry handling — it's saved us X hours a week. Happy to connect you if you're curious.'"
    ]},
    { type:"heading", text:"Increasing Revenue Per Client" },
    { type:"prose", content:`Getting to £2k/month doesn't necessarily mean 10 clients. It can mean 5 clients who each pay you more.` },
    { type:"bullets", items:[
      "<strong>Stack workflows:</strong> Once the enquiry handler is running, pitch the next problem. 'You mentioned your weekly reporting takes 3 hours — I could automate that too.' Each additional workflow is lower effort than the first because the infrastructure is already in place.",
      "<strong>Increase retainer scope:</strong> After 3 months of good results, revisit the retainer: 'I'd like to offer a higher tier that includes proactive optimisation — I'll review your workflow monthly and suggest improvements, not just fix issues.' £50–100/month more.",
      "<strong>Introduce new capabilities:</strong> When you learn a new pattern (document processing, CRM enrichment), go back to existing clients first. They already trust you."
    ]},
    { type:"heading", text:"Using Content to Attract Inbound" },
    { type:"prose", content:`Content takes longer but it compounds in a way cold outreach never does. One post seen by 5,000 people will generate more leads than 500 cold messages. It just takes a few months to get there.` },
    { type:"bullets", items:[
      "<strong>Before/after posts:</strong> 'This dental clinic was spending 2 hours a day replying to enquiries. Here's what I built to automate it.' Include numbers. Include a demo clip.",
      "<strong>Specific problem posts:</strong> 'If you run a gym and you're losing leads because you can't follow up fast enough, here's exactly what's happening and how to fix it.' Specific = more engagement, better qualified inbound.",
      "<strong>Process transparency:</strong> 'Here's the 4-step process I use to scope every AI automation project before writing a single line of code.' Positions you as expert, not salesperson."
    ]},
    { type:"heading", text:"When to Hire Help" },
    { type:"prose", content:`At some point your time becomes the bottleneck. Probably around 8-10 clients. The answer isn't to immediately hire — there's a cheaper intermediate step.` },
    { type:"bullets", items:[
      "<strong>Subcontract first:</strong> Find another developer who can build to your specifications. You do the client-facing work (scoping, delivery, relationship). They do the build. Split the fee.",
      "<strong>Document your process first:</strong> You can only subcontract what you've written down. Before you hire anyone, your scoping document, build checklist, and test protocol need to be written so clearly that someone else could follow them.",
      "<strong>Keep the client relationship:</strong> The relationship is your asset. Even when you subcontract builds, you remain the point of contact. This keeps clients with you, not with the person doing the work."
    ]},
    { type:"tip-block", content:`<strong>The number that matters:</strong> Monthly recurring revenue (MRR) from retainers. This is more valuable than one-off project fees because it's predictable. £1,000 MRR from 5 retainer clients is a better position than £2,000 in one-off fees that might not repeat. Build the retainer base first. Then add project fees on top.` },
    { type:"heading", text:"Building Your Portfolio and Case Studies" },
    { type:"prose", content:`Every client project is also a marketing asset. The case study format that converts best for this type of work is: before state → specific intervention → measurable after state. Numbers matter.` },
    { type:"bullets", items:[
      "<strong>Before state:</strong> 'The team was manually responding to 35-40 enquiries per week. Average response time was 4-6 hours. During busy periods, some enquiries weren't replied to at all.'",
      "<strong>Intervention:</strong> 'We built an automated enquiry handling workflow: Tally form → n8n → Claude API → Resend. Every submission gets a personalised reply within 30 seconds.'",
      "<strong>After state:</strong> 'Response time dropped from hours to under 30 seconds. The practice manager estimates they've recaptured 2-3 leads per week that previously went cold. Zero missed enquiries in the 6 weeks since launch.'",
    ]},
    { type:"prose", content:`Get the before-and-after numbers from your client at the 30-day check-in. Most are happy to share them — they're proud of the result too.` },
    { type:"heading", text:"Positioning Your Service" },
    { type:"prose", content:`How you describe what you do affects who reaches out and what they expect to pay. Avoid the word 'automation' — it sounds like a commodity. Use language that emphasises the outcome and the expertise.` },
    { type:"bullets", items:[
      "<strong>Instead of:</strong> 'I build AI automations for small businesses.'",
      "<strong>Try:</strong> 'I build systems that handle the repetitive admin work in service businesses — so owners spend their time on work that actually requires them.'",
      "<strong>Or more specific:</strong> 'I work with dental clinics and healthcare practices to automate patient enquiries and admin. Most clients save 5-10 hours of staff time per week within the first month.'",
    ]},
    { type:"heading", text:"Productising Your Service" },
    { type:"prose", content:`At some point, stop selling custom projects and start selling products — defined solutions at fixed prices that you've built before and can deliver consistently.` },
    { type:"bullets", items:[
      "<strong>The Enquiry Engine:</strong> Automated enquiry handling for service businesses. Fixed scope. Fixed price. £600 setup + £200/month. You deliver this in a week because you've built it 20 times.",
      "<strong>The Lead Capture System:</strong> Lead form → instant personalised follow-up → CRM logging → 3-touch follow-up sequence over 7 days. For gyms, clinics, PT studios. £800 setup + £200/month.",
      "<strong>The Weekly Digest:</strong> Scheduled report from any data source, AI-written summary, delivered to the management team every Monday. £400 setup + £150/month.",
      "<strong>Why productising works:</strong> You can describe it in one sentence. You know exactly what's in scope. You can price it confidently. You can fulfil it fast. Clients know what they're buying. The whole sales process speeds up.",
    ]},
  ],
  checklist:[
    "I have a clear goal for each of the first 3 months",
    "I know exactly when and how to ask for referrals",
    "I have 2 strategies for increasing revenue per existing client",
    "I know what content I'd post to attract inbound enquiries",
    "I understand when and how to subcontract once I scale",
    "I can write a compelling before/after case study",
    "I know how I'd describe my service in one sentence",
    "I can define at least 2 productised service offerings"
  ]
}

// ─── 12: PROMPT ENGINEERING DEEP DIVE ───────────────────────────────────────
{
  badge:"Module 12 · Advanced", title:"Prompt Engineering: The Full Playbook", readTime:"20 min",
  subtitle:"Everything that actually matters when writing instructions for AI — beyond the basics.",
  sections:[
    { type:"heading", text:"Why Prompt Engineering is a Skill, Not a Trick" },
    { type:"prose", content:`Most people treat prompting like searching Google — type something in, hope for the best, adjust if it's wrong. That works for casual use. For production workflows that need to reliably handle thousands of inputs, it's not enough. Prompt engineering is a systematic discipline with repeatable techniques.` },
    { type:"prose", content:`The goal isn't to write a clever prompt once. It's to write a prompt that produces the right output for 99% of inputs, handles edge cases gracefully, and can be updated when the business changes without breaking everything else.` },
    { type:"heading", text:"The Anatomy of a Production Prompt" },
    { type:"bullets", items:[
      "<strong>Context block:</strong> Who is the AI, what does it know, what situation is it in. This is the foundational layer. Everything else builds on it.",
      "<strong>Task block:</strong> The specific job for this call. One sentence. One job. If you need the AI to do two things, make two calls.",
      "<strong>Input block:</strong> The actual data being processed. Clearly delimited from the instructions. Use XML tags: <customer_message>, <invoice_data>, <cv_text>.",
      "<strong>Output specification:</strong> Exactly what format the response should take. JSON object with specific keys, plain text under 150 words, a single word from a defined list.",
      "<strong>Examples block:</strong> 2-3 worked examples of input → output. This is the single highest-impact addition you can make to any prompt.",
      "<strong>Constraints block:</strong> Hard limits. What Claude must never do, what it must always do, what to do when it's unsure.",
    ]},
    { type:"heading", text:"Few-Shot Prompting in Practice" },
    { type:"prose", content:`Few-shot prompting — providing examples directly in the prompt — is the most reliable technique for improving output quality. Here's how to do it properly.` },
    { type:"bullets", items:[
      "<strong>Choose diverse examples:</strong> Don't show 3 examples of the same type of input. Show 3 different scenarios that cover different edge cases. The model generalises from what it sees.",
      "<strong>Show the thinking, not just the answer:</strong> For complex classification, include a brief rationale in your examples. 'INPUT: [message]. REASONING: This mentions a price dispute, which is billing-related. OUTPUT: BILLING.' The model learns the reasoning pattern, not just the label.",
      "<strong>Keep examples current:</strong> If your business adds new services or categories, update the examples. Stale examples actively mislead the model.",
      "<strong>Negative examples matter:</strong> Include at least one example of what NOT to do. 'This is an example of a bad response: [example]. Do not do this.' Works better than just describing the rule.",
    ]},
    { type:"code", content:`// Example of a well-structured few-shot prompt
You are an enquiry classifier for a dental clinic.

TASK: Read the patient message and output exactly one of:
BOOKING | BILLING | CLINICAL | GENERAL | URGENT

EXAMPLES:
INPUT: "Hi, I'd like to book a checkup for next week"
OUTPUT: BOOKING

INPUT: "I was charged twice on my last invoice, invoice #1042"
OUTPUT: BILLING

INPUT: "I've had a toothache for 3 days and it's getting worse"
OUTPUT: URGENT

INPUT: "What are your opening hours on Saturday?"
OUTPUT: GENERAL

CONSTRAINT: Output only the category word. Nothing else.
If you cannot confidently classify, output: GENERAL

MESSAGE TO CLASSIFY:
<message>{{$json.message}}</message>` },
    { type:"heading", text:"Chain-of-Thought for Complex Tasks" },
    { type:"prose", content:`For tasks that require reasoning — not just pattern matching — telling Claude to think before it responds dramatically improves accuracy. Add one of these phrases to your directive:` },
    { type:"bullets", items:[
      "<strong>'Think step by step before responding'</strong> — general purpose. Works for most reasoning tasks.",
      "<strong>'First identify X, then determine Y, then produce Z'</strong> — structured multi-step reasoning. Good for qualification or triage tasks.",
      "<strong>'Briefly reason through this before giving your final answer'</strong> — produces a reasoning trace you can log for debugging.",
      "<strong>Scratchpad pattern:</strong> Ask Claude to output its reasoning inside <thinking> tags, then its final answer outside them. Your parser strips the <thinking> block and uses only the final answer, but you log the full response for debugging.",
    ]},
    { type:"heading", text:"Handling Hallucinations" },
    { type:"prose", content:`Hallucination — Claude confidently stating something that isn't true — is the most serious failure mode in production workflows. Here's how to minimise it:` },
    { type:"bullets", items:[
      "<strong>Ground every claim in provided data:</strong> 'Only use information from the <business_info> block below. Do not use any knowledge from outside this context.' Forces Claude to cite from what you gave it.",
      "<strong>Explicit uncertainty handling:</strong> 'If you are not certain of an answer based on the information provided, say exactly: I don't have that information.' Models trained on helpfulness tend to answer even when they shouldn't — this overrides that.",
      "<strong>Factual boundary setting:</strong> Tell Claude what it cannot claim. 'Do not state specific prices unless they appear in the pricing table below.' Eliminates the most common hallucination type for business workflows.",
      "<strong>Output validation:</strong> Add a second cheap API call that checks the first output. 'Does the following reply contain any claims about prices, availability, or specific dates that are not in the business info? Answer YES or NO.' Route YES responses to human review.",
    ]},
    { type:"tip-block", content:`<strong>The hallucination test:</strong> After building a directive, deliberately ask Claude things it shouldn't know. Give it a customer question about a product you didn't include in the context. If it makes up an answer instead of triggering the fallback, your constraints need tightening.` },
  ],
  checklist:[
    "I can write a production prompt with all 6 blocks",
    "I know how to write effective few-shot examples",

    { type:"prose", content:`API stands for Application Programming Interface. Practically: it's a way for two pieces of software to talk to each other over the internet. When n8n calls the Anthropic API, it sends a message in a specific format, and Anthropic's servers send back a response in a specific format. Both sides agree on the format in advance — that agreement is the API.` },

    { type:"prose", content:`A webhook is the reverse of an API call. Instead of you requesting data, an external service sends data to you when something happens. Tally sends a webhook when a form is submitted. Stripe sends a webhook when a payment succeeds. GitHub sends a webhook when code is pushed.` },

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentModule = 0;
const completedModules = new Set();

function initState() {
  // checklistState removed — using simple completedModules Set

// ─── NAV ─────────────────────────────────────────────────────────────────────
function buildNav() {
  const container = document.getElementById('navContainer');
  let moduleIndex = 0;
  NAV_STRUCTURE.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    sec.innerHTML = `<div class="nav-section-label">${section.label}</div>`;
    section.modules.forEach(idx => {
      const m = modules[idx];
      const item = document.createElement('div');
      item.className = 'nav-item' + (idx === 0 ? ' active' : '');
      item.dataset.module = idx;
      item.onclick = () => showModule(idx);
      const isStart = section.label === 'Start Here';
      item.innerHTML = `<div class="check" id="check-${idx}">${isStart ? '★' : idx}</div><div class="nav-label">${m.title}</div>`;
      sec.appendChild(item);
    });
    container.appendChild(sec);
  });
}

function updateNav() {
  modules.forEach((_, i) => {
    const item = document.querySelector(`[data-module="${i}"]`);
    const check = document.getElementById(`check-${i}`);
    if (!item || !check) return;
    item.classList.toggle('active', i === currentModule);
    item.classList.toggle('completed', completedModules.has(i));
    if (completedModules.has(i)) check.innerHTML = '✓';
    else if (i === 0) check.innerHTML = '★';
    else check.innerHTML = i;
  });
}

function updateProgress() {
  const done = completedModules.size;
  const total = modules.length;
  document.getElementById('progressFill').style.width = (done/total*100) + '%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} modules complete`;
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').style.display = 'none';
}

function toggleSidebarDesktop() {
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const isOpen = sidebar.classList.contains('open');
    if (isOpen) {
      sidebar.classList.remove('open');
      overlay.style.display = 'none';
    } else {
      sidebar.classList.add('open');
      overlay.style.display = 'block';
    }
  } else {
    document.querySelector('.shell').classList.toggle('sidebar-collapsed');
  }
}

// ─── COSTS TABLE ─────────────────────────────────────────────────────────────
function pill(color, label) {
  const map = { teal:'#e8735a', green:'#22d4a0', blue:'#7a9ab4', red:'#ff5a6a', amber:'#f0a030', muted:'#7a6560' };
  const clr = map[color] || color;
  return `<span class="s5-pill" style="color:${clr};background:${clr}18;border:1px solid ${clr}30">${label}</span>`;
}

function renderCostsTable() {
  const rows = [
    ['n8n Cloud Starter','Visual workflow builder — connects every tool together. This is where you build.','~£17/mo',pill('teal','Get this')],
    ['Claude API','The AI brain. Pennies for demos, £2–6/mo for a live client workflow at normal volume.','Pay as you go',pill('teal','Get this')],
    ['Supabase','Database. Logs runs, stores client data. Free tier handles first 3–4 clients fine.','Free',pill('green','Free')],
    ['Resend','Sends emails from workflows. 3,000/month on the free tier — won’t hit it early.','Free',pill('green','Free')],
    ['Tally.so','Form builder that fires a webhook on submit. Simplest way to create a trigger.','Free',pill('green','Free')],
    ['Vercel','Hosting and serverless functions. Dashboards, portfolio, custom API endpoints.','Free',pill('green','Free')],
    ['Custom domain','Not essential but worth it early. Makes you look real when pitching clients.','~£10/yr',pill('blue','Optional')],
    ['Make.com','Alternative to n8n. Fine tool, but pick one — n8n scales better long-term.','£9–16/mo',pill('red','Skip')],
    ['Zapier','More expensive and more limited than n8n. Not worth it.','£19+/mo',pill('red','Skip')],
    ['OpenAI API','Claude outperforms GPT-4o on document and text tasks — 90% of client work.','Pay as you go',pill('red','Skip')],
  ];
  const heads = ['Tool','What it does','Cost',''];
  const thead = heads.map(h => `<th>${h}</th>`).join('');
  const tbody = rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');
  return `<div class="s5-wrap"><table class="s5-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderSection(s) {
  switch(s.type) {
    case 'heading': return `<h2 class="section-heading">${s.text}</h2>`;
    case 'img': return `<div class="mod-img-wrap"><img src="${s.src}" alt="${s.alt||''}" loading="lazy" onerror="this.parentElement.style.display='none'"><div class="mod-img-caption">${s.caption||''}</div></div>`;
    case 'svg-img': return `<div class="mod-img-wrap">${s.svg}<div class="mod-img-caption">${s.caption||''}</div></div>`;
    case 'prose': return `<p class="prose">${s.content}</p>`;
    case 'callout': return `<div class="callout">${s.content}</div>`;
    case 'tip-block': return `<div class="tip-block">${s.content}</div>`;
    case 'warning-block': return `<div class="warning-block">${s.content}</div>`;
    case 'bullets': {
      const isTermDef = s.items.length > 0 && s.items[0].startsWith('<strong>');
      if (isTermDef) {
        const cards = s.items.map(item => {
          const termMatch = item.match(/^<strong>(.*?)<\/strong>:?\s*(.*)/s);
          if (termMatch) {
            let def = termMatch[2].replace(/^[—–]\s*/, '').trim();
            return `<div class="def-card">
              <div class="def-card-label">${termMatch[1]}</div>
              <div class="def-card-body">${def}</div>
            </div>`;
          }
          return `<div class="def-card"><div class="def-card-body">${item}</div></div>`;
        }).join('');
        return `<div class="def-cards">${cards}</div>`;
      }
      return `<ul class="bullet-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    }
    case 'numbered-list': {
      const firstItem = s.items[0] || '';
      // Match: items starting with <strong>anything</strong> followed by text (colon, quote, or inline)
      const hasBoldStart = firstItem.match(/^<strong>[^<]+<\/strong>/);
      if (hasBoldStart) {
        const cards = s.items.map((item, idx) => {
          // Split at the first </strong> — term is inside <strong>, body is after
          const termMatch = item.match(/^<strong>(.*?)<\/strong>:?\s*(.*)/s);
          if (termMatch) {
            let def = termMatch[2].replace(/^[—–]\s*/, '').trim();
            // If def is empty, the whole item is just the term (e.g. just a label)
            const bodyHTML = def
              ? `<div class="step-card-body">${def}</div>`
              : '';
            return `<div class="step-card">
              <div class="step-card-header">
                <div class="step-card-num">${idx+1}</div>
                <div class="step-card-term">${termMatch[1]}</div>
              </div>${bodyHTML}
            </div>`;
          }
          return `<div class="step-card"><div class="step-card-header"><div class="step-card-num">${idx+1}</div><div class="step-card-term">${item}</div></div></div>`;
        }).join('');
        return `<div class="step-cards">${cards}</div>`;
      }
      return `<ol class="numbered-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ol>`;
    }
    case 'example-card': return `<div class="example-card"><div class="example-card-title">${s.title}</div><p>${s.body||s.content||''}</p></div>`;
    case 'scenario-block': return `<div class="scenario-block"><div class="scenario-label">${s.label}</div><div class="scenario-title">${s.title}</div><div class="scenario-body">${s.body}</div></div>`;
    case 'code': return `<div class="code-block">${s.content}</div>`;
    case 'costs-table': return renderCostsTable();
    case 'gen-table': {
      const thead = s.headers.map(h => `<th>${h}</th>`).join('');
      const tbody = s.rows.map(r => {
        const tds = r.map((cell, ci) => {
          let content = cell;
          if (typeof cell === 'string' && cell.startsWith('!!')) {
            const parts = cell.slice(2).split(':');
            content = pill(parts[0], parts.slice(1).join(':'));
          }
          return `<td>${content}</td>`;
        }).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<div class="s5-wrap"><table class="s5-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
    }
    case 'two-col': return `<div class="two-col">${s.items.map(i=>`<div class="example-card"><div class="example-card-title">${i.title}</div><p>${i.body}</p></div>`).join('')}</div>`;
    case 'month-cards': return `<div class="month-cards">${s.items.map(m=>`<div class="month-card"><div class="month-card-header"><span class="month-card-label">${m.month}: ${m.goal}</span></div><div class="month-card-body">${m.body}</div></div>`).join('')}</div>`;
    default: return '';
  }
}

function showModule(idx) {
  currentModule = idx;
  const m = modules[idx];
  const isCompleted = completedModules.has(idx);
  const isLast = idx === modules.length - 1;

  const prevBtn = idx > 0 ? `<button class="btn btn-secondary" onclick="showModule(${idx-1})">← Back</button>` : '';
  const nextBtn = !isLast ? `<button class="btn btn-primary" id="next-btn-${idx}" onclick="showModule(${idx+1})" ${isCompleted?'':'disabled'} style="opacity:${isCompleted?'1':'0.35'};cursor:${isCompleted?'pointer':'not-allowed'}">Next →</button>` : '';

  const pageDoneSection = isCompleted
    ? `<div class="page-done-wrap"><span class="page-done-badge">✓ Page marked as done</span></div>`
    : `<div class="page-done-wrap">
        <div class="page-done-hint">Read through the module, then mark it as done to unlock the next page.</div>
        <button class="btn-mark-done" onclick="markComplete(${idx})">Mark page as done</button>
      </div>`;

  document.getElementById('main').innerHTML = `
    <div class="module-meta">
      <span class="module-badge">${m.badge}</span>
      <span class="read-time">${m.readTime} read</span>
      ${isCompleted ? '<span class="completed-badge">✓ Done</span>' : ''}
    </div>
    <h1 class="module-title">${m.title}</h1>
    <p class="module-subtitle">${m.subtitle}</p>
    ${m.sections.map(renderSection).join('\n')}
    ${pageDoneSection}
    <div class="nav-footer">${prevBtn}${nextBtn}</div>
  `;

  updateNav();
  window.scrollTo(0,0);
  if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').style.display = 'none'; }
  // Kick off scroll animations for newly rendered content
  requestAnimationFrame(() => initScrollAnimations());
}



function markComplete(idx) {
  completedModules.add(idx);
  updateProgress();
  updateNav();
  // Replace the page-done section in place — no scroll
  const wrap = document.querySelector('.page-done-wrap');
  if (wrap) {
    wrap.innerHTML = '<span class="page-done-badge">✓ Page marked as done</span>';
  }
  // Unlock the next button in place
  const nextBtn = document.getElementById('next-btn-' + idx);
  if (nextBtn) {
    nextBtn.disabled = false;
    nextBtn.style.opacity = '1';
    nextBtn.style.cursor = 'pointer';
  }
}

// ─── SCROLL ANIMATIONS ────────────────────────────────────────────────────────
function initScrollAnimations() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.08 });

  // Animate main content blocks
  const animTargets = document.querySelectorAll(
    '.prose, .callout, .tip-block, .warning-block, .example-card, .scenario-block, .code-block, .s5-wrap, .two-col, .mod-img-wrap, .bullet-list, .numbered-list, .checklist-wrap, .def-cards, .step-cards'
  );
  animTargets.forEach((el, i) => {
    // Alternate animation types for variety
    if (el.classList.contains('s5-wrap')) {
      el.classList.add('anim-fade-up');
    } else if (el.classList.contains('callout') || el.classList.contains('tip-block') || el.classList.contains('warning-block')) {
      el.classList.add('anim-slide-left');
    } else {
      el.classList.add('anim-fade-up');
    }
    // Slight stagger for sibling elements
    el.style.transitionDelay = Math.min(i * 0.03, 0.2) + 's';
    io.observe(el);
  });

  // Also animate section headings
  document.querySelectorAll('.section-heading').forEach(el => {
    el.classList.add('anim-fade-in');
    io.observe(el);
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

buildNav();
showModule(0);
</script>
