<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Automation — Ethan's Course</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060b0b;
    --surface: #0c1414;
    --surface2: #121e1e;
    --border: #1a2e2e;
    --teal: #06b6d4;
    --teal-dim: #06b6d418;
    --teal-glow: #06b6d432;
    --teal-mid: #e85530;
    --green: #4ade80;
    --green-dim: #4ade8014;
    --accent2: #06b6d4;
    --accent2-dim: #06b6d414;
    --accent3: #4ade80;
    --accent3-dim: #4ade8012;
    --text: #ffffff;
    --muted: #3a6060;
    --muted2: #ccc8d8;
    --danger: #ff4d6a;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; font-size: 15px; line-height: 1.6; }
  .shell { display: flex; min-height: 100vh; width: 100%; }
  .shell.sidebar-collapsed .sidebar { width: 0; min-width: 0; overflow-x: hidden; overflow-y: hidden; border-right: none; }
  .shell.sidebar-collapsed .main { max-width: 100%; }

  /* SIDEBAR */
  .sidebar { width: 290px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; transition: width 0.25s ease, border 0.25s ease; }
  .sidebar-header { padding: 58px 20px 14px; border-bottom: 1px solid var(--border); }
  .course-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; color: var(--teal); text-transform: uppercase; margin-bottom: 5px; }
  .course-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .progress-bar-wrap { margin-top: 12px; background: #1a2e2e; border-radius: 99px; height: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #06b6d4, #06b6d4, #4ade80); border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { margin-top: 5px; font-size: 11px; color: var(--muted); }
  .nav-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .nav-section-label { padding: 5px 18px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .nav-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 18px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active { background: linear-gradient(90deg, var(--teal-dim) 0%, transparent 80%); border-left: 3px solid var(--teal); }
  .check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; color: var(--muted); transition: all 0.2s; margin-top: 1px; }
  .nav-item.completed .check { background: #4ade8018; border-color: var(--green); color: var(--green); font-size: 10px; }
  .nav-label { font-size: 12.5px; color: var(--muted2); line-height: 1.35; letter-spacing: -0.01em; }
  .nav-item.active .nav-label, .nav-item.completed .nav-label { color: var(--text); font-weight: 600; }
  .nav-item.active .nav-label { color: #ffffff; }

  /* MAIN */
  .main { flex: 1; padding: 52px 48px 52px 60px; max-width: 800px; min-width: 0; overflow-x: hidden; overflow-wrap: break-word; word-break: break-word; }
  .module-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .module-badge { font-size: 9px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--teal); background: var(--teal-dim); border: 1px solid var(--teal-glow); padding: 4px 14px; border-radius: 99px; box-shadow: 0 0 12px var(--teal-glow); }
  .read-time { font-size: 11px; color: #4a7070; }
  .module-title { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; line-height: 1.15; margin-bottom: 10px; letter-spacing: -0.02em; background: linear-gradient(135deg, #ffffff 30%, var(--teal) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .module-subtitle { font-size: 15px; color: #c8c4d4; margin-bottom: 36px; max-width: 580px; line-height: 1.65; }

  /* CONTENT */
  .content-block { margin-bottom: 30px; }
  .section-heading { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 14px; margin-top: 40px; padding: 0 0 0 14px; border-left: 3px solid var(--teal); border-top: none; letter-spacing: -0.01em; }
  .section-heading:first-child { margin-top: 0; }
  .block-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
  .prose { font-size: 15px; color: #d8d0cc; line-height: 1.8; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose em { color: #d0c8c4; font-style: italic; }

  .callout { background: linear-gradient(135deg, rgba(255,107,71,0.06), rgba(255,107,71,0.02)); border: 1px solid rgba(255,107,71,0.2); border-left: 3px solid var(--teal); border-radius: 10px; padding: 18px 20px; margin: 24px 0; font-size: 14px; color: var(--muted2); line-height: 1.8; }
  .callout strong { color: #ffffff; }

  .tip-block { background: #0d1e1a; border: 1px solid #0a3028; border-left: 3px solid #4ade80; border-radius: 8px; padding: 14px 20px; margin: 22px 0; font-size: 14px; color: #d0f0e8; line-height: 1.75; }
  .tip-block strong { color: #4ade80; }

  .warning-block { background: #1a0e14; border: 1px solid #3a1828; border-left: 3px solid #ff4d6a; border-radius: 8px; padding: 14px 20px; margin: 22px 0; font-size: 14px; color: #f0d8e0; line-height: 1.75; }
  .warning-block strong { color: var(--danger); }

  .bullet-list { list-style: none; margin: 14px 0; }
  .bullet-list li { display: flex; gap: 12px; font-size: 14px; color: #d8d0cc; line-height: 1.7; margin-bottom: 12px; }
  .bullet-list li::before { content: '→'; color: #06b6d4; flex-shrink: 0; margin-top: 1px; font-weight: 700; }

  .numbered-list { list-style: none; margin: 14px 0; counter-reset: item; }
  .numbered-list li { display: flex; gap: 14px; font-size: 14px; color: #d8d0cc; line-height: 1.7; margin-bottom: 16px; counter-increment: item; }
  .numbered-list li::before { content: counter(item); color: #4ade80; background: #4ade8014; border: 1px solid #4ade8030; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 800; margin-top: 1px; }

  .example-card { background: linear-gradient(135deg, var(--surface2), var(--surface)); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin: 18px 0; }
  .example-card-title { font-size: 9px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 10px; opacity: 0.85; }
  .example-card p { font-size: 14px; color: #d8d0cc; line-height: 1.7; }
  .example-card p + p { margin-top: 10px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
  .two-col .example-card { margin: 0; }

  .code-block { background: #04080a; border: 1px solid rgba(6,182,212,0.15); border-top: 1px solid rgba(6,182,212,0.3); border-radius: 10px; padding: 20px 20px; margin: 18px 0; font-family: 'Courier New', monospace; font-size: 12.5px; color: #a0f0ff; line-height: 1.85; overflow-x: auto; white-space: pre; max-width: 100%; word-break: break-all; position: relative; }
  .code-block::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--teal), transparent); }
  .code-comment { color: var(--muted); }

  .scenario-block { background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin: 20px 0; }
  .scenario-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; color: #4ade80; text-transform: uppercase; margin-bottom: 6px; }
  .scenario-title { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .scenario-body { font-size: 14px; color: #d8d0cc; line-height: 1.7; }

  .divider { height: 1px; background: #1a2e2e; margin: 36px 0; }

  /* module image */
  .mod-img-wrap { margin: 24px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .mod-img-wrap img { width: 100%; display: block; max-height: 340px; object-fit: cover; object-position: top; }
  .mod-img-caption { padding: 8px 14px; font-size: 11px; color: var(--muted); background: var(--surface2); border-top: 1px solid #1a2e2e; }

  /* CHECKLIST */

  /* FOOTER */
  .nav-footer { display: flex; gap: 12px; margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
  .page-done-wrap { margin-top: 40px; background: linear-gradient(135deg, rgba(0,229,160,0.05), rgba(0,229,160,0.02)); border: 1px solid rgba(0,229,160,0.2); border-radius: 14px; padding: 22px 24px; position: relative; overflow: hidden; }
  .page-done-wrap::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--green), transparent); }
  .page-done-hint { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .btn-mark-done { padding: 11px 28px; background: linear-gradient(135deg, #4ade80, #22c55e); color: #08120e; font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; box-shadow: 0 4px 16px #4ade8040; transition: all 0.15s; }
  .btn-mark-done:hover { background: linear-gradient(135deg, #86efac, #4ade80); box-shadow: 0 6px 20px #4ade8060; transform: translateY(-1px); }
  .btn-mark-done:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .page-done-badge { display: inline-flex; align-items: center; gap: 8px; background: #4ade8014; border: 1px solid #4ade8030; color: #4ade80; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 8px; }
  .btn { padding: 10px 22px; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Inter', sans-serif; }
  .btn-primary { background: linear-gradient(135deg, var(--teal), #0891b2); color: #fff; font-weight: 700; box-shadow: 0 4px 16px var(--teal-glow); }
  .btn-primary:hover { background: linear-gradient(135deg, #22d3ee, var(--teal)); box-shadow: 0 6px 20px var(--teal-glow); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: #c8c4d4; border: 1px solid #1a2e2e; }
  .btn-secondary:hover { color: var(--text); }
  .btn-complete { background: #4ade8014; color: #4ade80; border: 1px solid #4ade8030; font-weight: 700; }
  .btn-complete:hover { background: #4ade8020; }
  .completed-badge { display: inline-flex; align-items: center; gap: 6px; background: #4ade8014; border: 1px solid #4ade8030; color: #4ade80; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 99px; }

  /* COSTS TABLE */
  /* CE hybrid table */
  .s5-wrap { margin: 20px 0; width: 100%; }
  .s5-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
  .s5-table thead tr th { padding: 4px 14px 8px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .s5-table thead tr th:first-child { min-width: 120px; }
  .s5-table tbody tr td { padding: 12px 14px; font-size: 13px; color: #ccc8d8; line-height: 1.65; vertical-align: top; word-break: break-word; background: #121e1e; }
  .s5-table tbody tr td:first-child { color: var(--text); font-weight: 700; background: linear-gradient(135deg, var(--surface2), var(--surface)); border-radius: 8px 0 0 8px; white-space: normal; word-break: break-word; width: 160px; border-right: 1px solid var(--border); }
  .s5-table tbody tr td:last-child { border-radius: 0 8px 8px 0; }
  .s5-table tbody tr td:only-child { border-radius: 8px; }
  .s5-table tbody tr:hover td { filter: brightness(1.12); }
  .s5-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; white-space: nowrap; }
  @media (max-width: 600px) {
    .s5-table { border-spacing: 0 8px; }
    .s5-table thead { display: none; }
    .s5-table tbody tr td { display: block; white-space: normal; }
    .s5-table tbody tr td:first-child { border-radius: 8px 8px 0 0 !important; border-right: none; border-bottom: 1px solid var(--border); color: var(--teal); font-size: 12px; width: 100% !important; display: block; }
    .s5-table tbody tr td:last-child { border-radius: 0 0 8px 8px !important; width: 100% !important; display: block; }
  }

  /* Step-card style — image 2 layout: coral label top, body below */
  .step-cards { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
  .step-card { background: linear-gradient(135deg, var(--surface2), var(--surface)); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }  .step-card:hover { border-color: var(--teal-glow); }
  .step-card-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: linear-gradient(90deg, var(--teal-dim), transparent); }
  .step-card-num { width: 26px; height: 26px; border-radius: 50%; background: var(--teal-dim); border: 1.5px solid var(--teal-glow); color: var(--teal); font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 8px var(--teal-glow); }
  .step-card-term { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; word-break: break-word; overflow-wrap: break-word; }
  .step-card-body { padding: 14px 16px; font-size: 13.5px; color: var(--muted2); line-height: 1.7; }

  /* Definition-card style — image 2 layout for bullet tables: label top in coral, body below */
  .def-cards { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; }
  .def-card { background: linear-gradient(135deg, var(--surface2), var(--surface)); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }  .def-card:hover { border-color: var(--teal-glow); }
  .def-card-label { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; color: var(--teal); background: linear-gradient(90deg, var(--teal-dim), transparent); }
  .def-card-body { padding: 12px 16px; font-size: 13px; color: #ccc8d8; line-height: 1.65; }

  /* mobile-nav-toggle removed */
  .hamburger-btn { position: fixed; top: 14px; left: 14px; z-index: 200; width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 0; transition: all 0.2s; outline: none; -webkit-tap-highlight-color: transparent; backdrop-filter: blur(8px); }
  .hamburger-btn:hover { background: var(--surface2); border-color: var(--teal); box-shadow: 0 0 12px var(--teal-glow); }
  .hamburger-btn:focus { outline: none; }
  .hamburger-btn:focus-visible { outline: none; }
  .hamburger-btn span { display: block; width: 16px; height: 1.5px; background: var(--text); border-radius: 2px; transition: all 0.2s ease; transform-origin: center; }
  .shell.sidebar-collapsed .hamburger-btn span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
  .shell.sidebar-collapsed .hamburger-btn span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .shell.sidebar-collapsed .hamburger-btn span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -290px; z-index: 50; transition: left 0.3s ease; height: 100%; width: 290px; overflow-y: scroll; overflow-x: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-y; overscroll-behavior: contain; }
    .sidebar.open { left: 0; }
    .shell.sidebar-collapsed .sidebar { width: 290px; left: -290px; }
    .shell.sidebar-collapsed .sidebar.open { left: 0; }
    .main { padding: 56px 20px 28px; width: 100%; max-width: 100%; }
    .module-title { font-size: 22px; }
    .two-col { grid-template-columns: 1fr; }
    .sidebar-overlay { display: block; }
  }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 49; backdrop-filter: blur(2px); }

  /* ── SCROLL ANIMATIONS ─── */
  .anim-fade-up { opacity: 0; transform: translateY(22px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .anim-fade-up.visible { opacity: 1; transform: translateY(0); }
  .anim-fade-in { opacity: 0; transition: opacity 0.5s ease; }
  .anim-fade-in.visible { opacity: 1; }
  .anim-slide-left { opacity: 0; transform: translateX(-18px); transition: opacity 0.45s ease, transform 0.45s ease; }
  .anim-slide-left.visible { opacity: 1; transform: translateX(0); }
  /* Stagger delays for table rows */
  .s5-wrap .s5-table tbody tr { opacity: 0; transform: translateY(10px); transition: opacity 0.35s ease, transform 0.35s ease; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(1) { opacity: 1; transform: none; transition-delay: 0.05s; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(2) { opacity: 1; transform: none; transition-delay: 0.1s; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(3) { opacity: 1; transform: none; transition-delay: 0.15s; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(4) { opacity: 1; transform: none; transition-delay: 0.2s; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(5) { opacity: 1; transform: none; transition-delay: 0.25s; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(6) { opacity: 1; transform: none; transition-delay: 0.3s; }
  .s5-wrap.visible .s5-table tbody tr:nth-child(n+7) { opacity: 1; transform: none; transition-delay: 0.35s; }

  /* month-cards */
  .month-cards { display: flex; flex-direction: column; gap: 12px; margin: 18px 0; }
  .month-card { background: linear-gradient(135deg, var(--surface2), var(--surface)); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .month-card:hover { border-color: var(--teal-glow); }
  .month-card-header { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); background: linear-gradient(90deg, var(--teal-dim), transparent); }
  .month-card-label { display: block; font-size: 13px; font-weight: 700; color: var(--teal); }
  .month-card-body { padding: 14px 16px; font-size: 13.5px; color: var(--muted2); line-height: 1.75; }
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="course-tag">Ethan's Course</div>
      <div class="course-title">Build & Sell AI Automations</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 of 11 modules complete</div>
    </div>
    <div id="navContainer"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebarDesktop()" aria-label="Toggle sidebar">
  <span></span><span></span><span></span>
</button>

<script>
const NAV_STRUCTURE = [
  { label: "Start Here", modules: [0] },
  { label: "Foundations", modules: [1,2,3,4,5] },
  { label: "Building", modules: [6,7] },
  { label: "Selling", modules: [8,9,10] },
  { label: "Advanced", modules: [11,12,13] }
];

const modules = [

// ─── 0: COSTS ────────────────────────────────────────────────────────────────
{
  badge: "Start Here", title: "What It'll Cost You", readTime: "5 min",
  subtitle: "Every tool you need, what it costs, and which ones to skip. No surprises.",
  isCosts: true,
  sections: [
    { type:"prose", content:`Running costs for this business are embarrassingly low. <strong>Under £20/month</strong> while you're learning. Once you've got a client paying £300, you've covered more than a year of tooling. Here's the full breakdown.` },
    { type:"costs-table" },
    { type:"heading", text:"What You Need on Day One" },
    { type:"prose", content:`Get these sorted before you touch anything else. None of them require a card upfront.` },
    { type:"gen-table", headers:["Tool","What it does","Cost"], rows:[
      ["n8n Cloud","Visual workflow builder. Connects all your tools. Where you build everything.","~£17/mo"],
      ["Claude API","The AI brain. Pennies for demos, £2–6/mo for a live client workflow.","Pay as you go"],
      ["Supabase","Database. Logs runs, stores client data. Free tier covers first 3–4 clients.","Free"],
      ["Resend","Sends emails from workflows. 3,000/month free — won't hit this early on.","Free"],
      ["Tally.so","Form builder that fires a webhook on submit — triggers your n8n workflow.","Free"],
    ]},
    { type:"callout", content:`<strong>Month 1 total: ~£17–20.</strong> Land your first client at £300 and you've covered 15 months of running costs. This business model is high-margin from the start.` },
    { type:"heading", text:"What to Skip" },
    { type:"gen-table", headers:["Tool","The temptation","Why to skip it"], rows:[

// ─── 1: WHAT IS AN AI WORKFLOW ───────────────────────────────────────────────
{
  badge:"Module 1 · Foundations", title:"What is an AI Workflow?", readTime:"15 min",
  subtitle:"The mental model you need before writing a single line of code or making a single sales call.",
  sections:[
    { type:"heading", text:"The One-Sentence Definition" },
    { type:"prose", content:`Strip away the hype and an AI workflow is simple: <strong>a system where AI makes decisions inside an automated process.</strong> Not a chatbot. Not a script someone has to run manually. A thing that fires on its own, reads a situation, decides what to do, and does it.` },
    { type:"prose", content:`A regular automation is a vending machine — same input, same output, no judgment. An AI workflow is more like hiring someone: you give them context, they figure out what the situation needs, and they handle it. Even when it's a bit different every time.` },
    { type:"heading", text:"Automation vs AI Workflow — The Real Difference" },
    { type:"prose", content:`This distinction is the whole ballgame when it comes to pricing. Most people lump them together and end up charging Zapier rates for something worth 5x that.` },
    { type:"two-col", items:[
      { title:"Standard Automation", body:"Sends the same receipt email after every purchase. Moves a Trello card when a form is submitted. Posts a tweet on a schedule. <strong>Rule-based. No interpretation. Fails if the input varies.</strong>" },
      { title:"AI Workflow", body:"Reads a customer complaint, decides if it's urgent, writes a personalised response, and escalates to a human only if needed. <strong>Judgment-based. Handles variation. Gets smarter as you refine it.</strong>" }
    ]},
    { type:"callout", content:`<strong>Why this matters for pricing:</strong> Standard automation is a commodity. Clients can Google "how to set up Zapier" and do it themselves. AI workflows need judgment, careful testing, and expertise to get right — which is why you can charge 3–5x more for them.` },
    { type:"heading", text:"The 4-Part Anatomy of Every Workflow" },
    { type:"prose", content:`Every workflow — no matter how complicated it looks — is just these four things in sequence. Once you've got this wired in, you can look at any client problem and immediately see how to build a solution.` },
    { type:"numbered-list", items:[
      "<strong>Trigger:</strong> The event that starts everything. An email arrives. A form is submitted. A new row appears in a spreadsheet. A scheduled time hits. A webhook fires from another app. No trigger = nothing runs.",
      "<strong>Input processing:</strong> The raw data gets cleaned, structured, and prepared. Extract the customer name from the email. Parse the date from the form. Look up existing records in the database. This step makes the AI's job easier and outputs more consistent.",
      "<strong>AI reasoning:</strong> Claude (or another model) reads the structured input and produces an output — a reply, a classification, a summary, a decision, a score. This is the only step that involves intelligence. Everything else is mechanical.",
      "<strong>Action execution:</strong> The AI's output triggers a concrete action. An email gets sent. A database row gets written. A Slack message fires. A calendar event gets created. A PDF gets generated. This step is purely deterministic — it does exactly what it's told."
    ]},
    { type:"example-card", title:"Real Example — Walk Through the 4 Parts", body:"A dental clinic gets 40 enquiry emails a week. Currently, a receptionist reads each one and writes a reply. <br><br><strong>Trigger:</strong> New email arrives in clinic inbox.<br><strong>Input processing:</strong> Extract sender name, email subject, and body text. Check if sender is already in Supabase patient database.<br><strong>AI step:</strong> Claude reads the enquiry, determines the type (new patient, appointment request, billing question), and writes an appropriate personalised reply using clinic information from the system prompt.<br><strong>Action:</strong> Reply sent automatically. Log entry written to Supabase with timestamp, enquiry type, and reply text." },
    { type:"svg-img", svg:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" style="width:100%;height:auto;display:block;background:#060b0b">\n  <defs>\n    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">\n      <path d="M0,0 L0,6 L8,3 z" fill="#e8735a" opacity="0.6"/>\n    </marker>\n  </defs>\n  <!-- boxes -->\n  <rect x="20" y="80" width="130" height="56" rx="8" fill="#1a1412" stroke="#e8735a" stroke-opacity="0.4" stroke-width="1.5"/>\n  <text x="85" y="104" text-anchor="middle" fill="#e8735a" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1">TRIGGER</text>\n  <text x="85" y="120" text-anchor="middle" fill="#e8e0dc" font-family="Inter,sans-serif" font-size="11">Form submitted</text>\n  <line x1="150" y1="108" x2="188" y2="108" stroke="#e8735a" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>\n\n  <rect x="190" y="80" width="148" height="56" rx="8" fill="#1a1412" stroke="#e8735a" stroke-opacity="0.4" stroke-width="1.5"/>\n  <text x="264" y="104" text-anchor="middle" fill="#e8735a" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1">INPUT</text>\n  <text x="264" y="120" text-anchor="middle" fill="#e8e0dc" font-family="Inter,sans-serif" font-size="11">Extract + structure</text>\n  <line x1="338" y1="108" x2="376" y2="108" stroke="#e8735a" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>\n\n  <rect x="378" y="80" width="148" height="56" rx="8" fill="#1a1412" stroke="#e8735a" stroke-opacity="0.9" stroke-width="1.5"/>\n  <text x="452" y="104" text-anchor="middle" fill="#e8735a" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1">AI STEP</text>\n  <text x="452" y="120" text-anchor="middle" fill="#e8e0dc" font-family="Inter,sans-serif" font-size="11">Claude writes reply</text>\n  <line x1="526" y1="108" x2="564" y2="108" stroke="#e8735a" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>\n\n  <rect x="566" y="80" width="130" height="56" rx="8" fill="#1a1412" stroke="#e8735a" stroke-opacity="0.4" stroke-width="1.5"/>\n  <text x="631" y="104" text-anchor="middle" fill="#e8735a" font-family="Inter,sans-serif" font-size="10" font-weight="700" letter-spacing="1">ACTION</text>\n  <text x="631" y="120" text-anchor="middle" fill="#e8e0dc" font-family="Inter,sans-serif" font-size="11">Email sent + logged</text>\n\n  <!-- labels -->\n  <text x="360" y="185" text-anchor="middle" fill="#4a7070" font-family="Inter,sans-serif" font-size="11">The 4-part anatomy — every workflow you build follows this exact sequence</text>\n</svg>', caption:"The 4-part anatomy — every workflow follows this exact sequence" },
    { type:"heading", text:"The 7 Most Common Workflow Categories" },
    { type:"prose", content:`This is what businesses actually hand over money to fix. When a client describes their problem, it'll almost always map to one of these.` },
    { type:"gen-table", headers:["Category","What it does","Typical trigger"], rows:[

    { type:"heading", text:"How AI Workflows Make Money" },
    { type:"prose", content:`Understanding the value chain is critical before you talk to a single client. There are three ways workflows generate measurable ROI — and you'll use all three as sales arguments.` },
    { type:"bullets", items:[
      "<strong>Time saved:</strong> A task that takes a human 10 minutes, done 50 times a week, is 500 minutes of staff time. At £20/hr that's £167/week — £8,700/year. Automation handles it in seconds.",
      "<strong>Revenue recovered:</strong> Slow follow-up loses leads. A gym that gets 30 enquiries a week and converts 20% manually might convert 35% with instant automated follow-up. On £500 memberships, that's £750/week in recovered revenue.",
      "<strong>Error reduction:</strong> Human data entry has a 1-4% error rate. AI processing of structured inputs, properly tested, approaches 0%. For invoicing, compliance, or record-keeping, this has real financial value.",
    ]},
    { type:"heading", text:"The 3 Types of AI Workflow" },
    { type:"prose", content:`Not all workflows are the same. Before you scope anything for a client, identify which type you're building — it determines the architecture, the testing approach, and the risk profile.` },
    { type:"bullets", items:[
      "<strong>Reactive workflows:</strong> Triggered by an external event. Someone submits a form, sends an email, or makes a payment. The workflow fires, processes, and responds. Most client projects start here. Predictable, testable, high value.",
      "<strong>Scheduled workflows:</strong> Run on a timer. Every Monday at 9am, pull last week's data, generate a report, send it to the management team. No human involvement. Low risk, high perceived value.",
      "<strong>Agentic workflows:</strong> The AI actively decides what to do next based on its outputs. It might search the web, check a database, call an API, and loop until it's satisfied. More complex, harder to debug, but capable of genuinely impressive results. Build reactive workflows first.",
    ]},
    { type:"heading", text:"What AI Workflows Cannot Do (Yet)" },
    { type:"prose", content:`Know where the edges are before you promise something you can't deliver. This is what separates people who keep clients from people who get refund requests.` },
    { type:"warning-block", content:`<strong>Don't promise any of this until you've built and tested it:</strong> Real-time voice (technically possible, genuinely complicated), visual interpretation of images with complex layouts, anything requiring genuine strategic judgment, tasks where being wrong has serious consequences (medical, legal, financial). Always put a human in the loop for high-stakes decisions.` },
    { type:"tip-block", content:`<strong>The intern test:</strong> Could a smart, diligent intern do this job if you gave them a detailed checklist and enough time? If yes, AI can probably handle it. If it requires years of expertise, real-world intuition, or physical presence — it can't.` },
    { type:"heading", text:"Why Workflows Fail (and How to Avoid It)" },
    { type:"prose", content:`Most failed AI projects share the same root causes. Understanding them upfront saves you from repeating them.` },
    { type:"bullets", items:[
      "<strong>Vague directives:</strong> The most common cause of poor output. 'Be helpful' is not a directive. 'You are a patient coordinator at a physiotherapy clinic. Your only job is to classify incoming enquiries into one of four categories and respond accordingly' — that's a directive.",
      "<strong>No input validation:</strong> Real users send garbage. Empty forms, half-finished thoughts, messages in the wrong language, forwarded email chains with 40 lines of quoted text. If you don't clean the input before it hits Claude, unpredictable outputs follow.",
      "<strong>Testing only the happy path:</strong> Works great in your demo. Falls apart the first time a real user does something unexpected. Build a proper adversarial test set.",
      "<strong>No fallback handling:</strong> Every AI step needs a 'what if this goes wrong' path. What if Claude returns malformed JSON? What if the API is down? What if the email fails to send? Map it out before you go live.",
      "<strong>Changing too much at once:</strong> When a live workflow breaks, you need to know what caused it. If you updated the prompt, the model, and the email template at the same time, you have no idea which change broke it. Change one thing, test, then change the next.",
    ]},

// ─── 2: THE DOE FRAMEWORK ────────────────────────────────────────────────────
{
  badge:"Module 2 · Foundations", title:"The Framework That Makes Workflows Reliable", readTime:"18 min",
  subtitle:"Why most AI builds fail in production — and the 3-layer system that fixes it.",
  sections:[
    { type:"heading", text:"Why Demos Work and Production Breaks" },
    { type:"prose", content:`Here's what happens to almost everyone: you build something, test it yourself with tidy inputs, it works great. Then a real person uses it. They write three questions in one rambling paragraph, use abbreviations, forget to fill in a field, or reply to the automated email. It breaks.` },
    { type:"prose", content:`The cause is almost always the same: <strong>one bloated prompt trying to do too many things at once, with no fallbacks and no separation between the AI's reasoning and the code executing the result.</strong> When it gets confused — and it will — you get either garbage output or a silent failure.` },
    { type:"callout", content:`<strong>The thing to internalise:</strong> AI reasons well. It's unpredictable without constraints. Your job is to give it precise instructions, hard limits, and let code handle everything that doesn't need thinking.` },
    { type:"heading", text:"The DOE Framework" },
    { type:"prose", content:`DOE is the mental model that fixes this. Directives, Orchestration, Execution — three layers, each with a specific job. The underlying principle shows up in every well-built AI system.` },
    { type:"scenario-block", label:"Layer 1", title:"Directives — The Rules", body:"Everything Claude needs to know <em>before</em> it sees the user's message. This is your system prompt. It defines who Claude is in this context, what it's allowed to do, what it must never do, what format to respond in, what tone to use, and what to do when it's unsure. Think of it as the employee handbook you hand someone on their first day. The more specific, the better." },
    { type:"scenario-block", label:"Layer 2", title:"Orchestration — The Brain", body:"This is the AI making a decision. It reads the input, applies the directives, and decides what output to produce. Keep this layer doing one thing at a time. Don't ask it to read an email, classify it, decide urgency, write a reply, summarise the issue, and update a record in one prompt. Break it into separate steps. Each step should have a single, clear job." },
    { type:"scenario-block", label:"Layer 3", title:"Execution — The Hands", body:"Deterministic code carrying out the AI's decision. Sending the email. Writing the database record. Posting to Slack. Making the API call. No AI involved. This layer does exactly what it's told, every time, with no interpretation. If execution is failing, it's a code bug. If reasoning is wrong, it's a directive problem. Separation makes debugging possible." },
    { type:"heading", text:"Writing Directives That Actually Work" },
    { type:"prose", content:`If there's one thing to get right, it's this. Vague system prompt, unpredictable outputs. Tight system prompt, something you can actually deploy. Five things every directive needs to cover:` },
    { type:"numbered-list", items:[
      "<strong>Role:</strong> Who is Claude in this context? 'You are a customer support agent for Bloom Dental Clinic in Manchester.' Not 'You are a helpful assistant.' Specific.",
      "<strong>Task:</strong> What is the one job? 'Your job is to read incoming patient enquiries and write a warm, professional reply that answers their question or books them in for a consultation.' One job. Not five.",
      "<strong>Knowledge:</strong> What does Claude need to know to do the job? Include clinic hours, pricing ranges, service list, FAQs, anything a new receptionist would need to know on day one. This goes in the system prompt.",
      "<strong>Constraints:</strong> What must Claude never do? 'Do not make up prices. Do not promise appointment slots. Do not give medical advice. If unsure, say you'll follow up.' Hard limits, stated explicitly.",
      "<strong>Format:</strong> What should the output look like? 'Reply in plain English, max 3 paragraphs. Start with the patient's name. End with a call to action. No bullet points. Friendly but professional tone.'"
    ]},
    { type:"callout", content:`<strong>Always include a fallback.</strong> Something like: 'If you can't answer this confidently with the information provided, say: "Thanks for reaching out — someone from our team will follow up within 24 hours."' This catches the edge cases your directive didn't anticipate. Without it, Claude will hallucinate an answer instead of admitting it doesn't know.` },
    { type:"heading", text:"A Full Example Directive" },
    { type:"code", content:`You are a patient enquiry assistant for Bloom Dental Clinic, Manchester.

YOUR JOB:
Read the incoming patient message and write a warm, professional reply.
Answer their question if you can. If they want to book, guide them to 
call 0161 XXX XXXX or use the booking link: bloomdental.co.uk/book

CLINIC INFORMATION:
- Open Mon–Fri 8am–6pm, Sat 9am–1pm
- Services: checkups (£60), hygiene (£80), whitening (£299), Invisalign (from £2,500)
- New patients welcome. NHS not accepted.
- Emergency appointments available same-day if called before 10am

CONSTRAINTS:
- Never quote exact treatment costs beyond the ranges above
- Never diagnose dental conditions
- Never promise a specific appointment slot
- Do not discuss competitor clinics

FORMAT:
- Start with "Hi [Name],"
- Max 3 short paragraphs
- End with a clear next step
- Warm, professional tone — like a friendly receptionist, not a robot

IF UNSURE:
Reply: "Thanks for your message — I'll make sure one of our team 
gets back to you shortly to help with this."` },
    { type:"heading", text:"Orchestration: Breaking Tasks Into Steps" },
    { type:"prose", content:`One prompt, one job. That's the rule. Chaining is how you handle complexity without making any single step fragile.` },
    { type:"bullets", items:[
      "<strong><strong>Step 1 —</strong> Classify:</strong> Ask Claude to read the message and output a single word: BOOKING, BILLING, COMPLAINT, GENERAL, URGENT. Nothing else.",
      "<strong><strong>Step 2 —</strong> Route:</strong> Use n8n's switch node to send the message down different paths based on that classification.",
      "<strong><strong>Step 3 —</strong> Respond:</strong> Each path has its own Claude step with a directive tuned specifically for that message type.",
      "<strong><strong>Step 4 —</strong> Log:</strong> All paths end with an execution step that writes the output to Supabase and sends the reply."
    ]},
    { type:"tip-block", content:`<strong>The single-job test:</strong> Write the prompt's job in one sentence, starting with a verb. 'Classify this into one of 5 categories.' 'Write a reply.' 'Extract the name, number, and issue.' If you can't do it in one sentence, split the step.` },
    { type:"heading", text:"Execution: What Goes in Code vs AI" },
    { type:"prose", content:`If it doesn't require reading, understanding, or deciding — it shouldn't involve AI. Code is faster, cheaper, and predictable. Use it for everything mechanical.` },
    { type:"two-col", items:[
      { title:"Use AI for...", body:"Reading and understanding text. Classifying or categorising. Writing natural language. Making decisions with nuance. Summarising or extracting meaning from unstructured data." },
      { title:"Use code for...", body:"Sending emails. Writing database records. Formatting data. Making API calls. Routing logic (if classification = X, do Y). Date/time operations. Any arithmetic." }
    ]},
    { type:"warning-block", content:`<strong>Never have AI decide and act in the same step.</strong> If Claude decides something should be escalated and sends the escalation email in one move, you have no checkpoint. Separate the decision from the action. AI decides. Code acts.` },
    { type:"heading", text:"Prompt Iteration: How to Get from Bad to Good" },
    { type:"prose", content:`Your first system prompt will not be your best. Prompt engineering is a process of deliberate iteration — not inspiration. Here's the exact loop to follow:` },
    { type:"numbered-list", items:[
      "<strong>Write:</strong> Draft the directive using the 5-part structure. Don't overthink it. Get something on paper.",
      "<strong>Test with 10 inputs:</strong> Run 10 varied inputs through the workflow. Include at least 2 edge cases you think might break it.",
      "<strong>Identify failure modes:</strong> For any output that's wrong or off-tone, ask: is this a directive problem (Claude didn't know the rule) or a scope problem (Claude was asked to do too much in one step)?",
      "<strong>Fix one thing:</strong> Change one element of the directive. Tighten a constraint, add a format rule, improve the fallback. One change at a time.",
      "<strong>Re-test:</strong> Run the same 10 inputs again. Did the change help? Did it break anything else?",
      "<strong>Repeat:</strong> Good prompts go through 5-10 iteration cycles. Production-grade prompts sometimes take 20+.",
    ]},
    { type:"heading", text:"Advanced Directive Patterns" },
    { type:"prose", content:`Once you've got the basics down, these patterns dramatically improve reliability.` },
    { type:"bullets", items:[
      "<strong>Chain-of-thought:</strong> Add 'Think step by step before responding' to complex classification tasks. Claude's accuracy improves significantly when it reasons before answering.",
      "<strong>Output anchoring:</strong> Tell Claude to start its response with a specific word or phrase. 'Begin your response with VERDICT:' makes outputs easier to parse in the next step.",
      "<strong>Negative examples:</strong> Instead of only saying what Claude should do, explicitly show what bad output looks like. 'Do NOT write responses like this: [example]'. Dramatically reduces the most common failure modes.",
      "<strong>Confidence gating:</strong> Ask Claude to rate its own confidence. 'If you are less than 80% confident this is the right classification, output UNSURE instead.' Routes uncertain cases to human review.",
      "<strong>Persona consistency:</strong> Give Claude a name and personality for client-facing workflows. 'You are Aria, the virtual assistant for [Business]. You are warm, professional, and concise.' Keeps tone consistent even across edge cases.",
    ]},
    { type:"callout", content:`<strong>Saving your prompts:</strong> Keep a prompt library. Every directive you write that works well is an asset. Build a simple Supabase table or even a Notion page with: client name, workflow type, the full system prompt, version number, date, and notes on what changed. When you onboard a new client in the same industry, you're starting from a proven template.` },
  ],
  checklist:[

  ]

// ─── 3: TOOLS DEEP DIVE ──────────────────────────────────────────────────────
{
  badge:"Module 3 · Foundations", title:"Your Tools, Deep Dive", readTime:"20 min",
  subtitle:"What each tool actually does, how it fits into a workflow, and what to learn first in each one.",
  sections:[
    { type:"heading", text:"n8n — Your Workflow Engine" },
    { type:"prose", content:`n8n is where everything comes together. Visual builder — you connect nodes on a canvas and the result runs automatically. Think of it as the plumbing. Claude is the brain, Supabase is the memory, Resend sends the emails — n8n is what ties them into a single working system.` },
    { type:"prose", content:`It handles the mechanical side — connecting services, running on schedules, branching on conditions, looping through lists, catching errors. Everything you'd otherwise have to write custom code for.` },
    { type:"bullets", items:[
      "<strong>Nodes:</strong> Each step in your workflow is a 'node'. There are trigger nodes (what starts the workflow), action nodes (what it does), and logic nodes (if/else, loops, merges).",
      "<strong>Expressions:</strong> You can reference data from previous steps using expressions like {{ $json.email }} or {{ $node['Step Name'].json.output }}. Learn this early — it's how data flows between steps.",
      "<strong>Error workflow:</strong> Set a separate workflow to run when something fails. Sends you a Telegram/email alert instead of silently failing. Essential for client workflows.",
      "<strong>Credentials:</strong> All API keys and auth tokens are stored in n8n's credential store. You set them once, reference them in any node.",
      "<strong>Webhook trigger:</strong> The most versatile trigger. Any external service that can send an HTTP request can start your workflow. Tally forms, Stripe payments, GitHub pushes — all use this."
    ]},
    { type:"svg-img", svg:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" style="width:100%;height:auto;display:block;background:#060b0b">\n  <!-- canvas bg -->\n  <rect x="0" y="0" width="720" height="240" fill="#040808"/>\n  <!-- grid dots -->\n  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">\n    <circle cx="12" cy="12" r="1" fill="#241c1a"/>\n  </pattern>\n  <rect width="720" height="240" fill="url(#dots)"/>\n  <!-- nodes -->\n  <rect x="40" y="90" width="120" height="52" rx="8" fill="#1a1412" stroke="#e8735a" stroke-width="1.5"/>\n  <rect x="40" y="90" width="120" height="16" rx="8" fill="#e8735a" opacity="0.15"/>\n  <text x="100" y="103" text-anchor="middle" fill="#e8735a" font-family="monospace" font-size="9" font-weight="700">WEBHOOK</text>\n  <text x="100" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Tally Form</text>\n  <text x="100" y="134" text-anchor="middle" fill="#4a7070" font-family="monospace" font-size="9">POST /webhook/xyz</text>\n  <!-- connector -->\n  <path d="M160,116 C190,116 200,116 220,116" stroke="#e8735a" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>\n  <defs>\n    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">\n      <path d="M0,0 L0,6 L7,3 z" fill="#e8735a" opacity="0.5"/>\n    </marker>\n  </defs>\n  <rect x="220" y="90" width="140" height="52" rx="8" fill="#1a1412" stroke="#241c1a" stroke-width="1.5"/>\n  <text x="290" y="103" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="9" font-weight="700">HTTP REQUEST</text>\n  <text x="290" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Claude API</text>\n  <text x="290" y="134" text-anchor="middle" fill="#4a7070" font-family="monospace" font-size="9">api.anthropic.com</text>\n  <path d="M360,116 C390,116 400,116 420,116" stroke="#e8735a" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>\n  <rect x="420" y="90" width="120" height="52" rx="8" fill="#1a1412" stroke="#241c1a" stroke-width="1.5"/>\n  <text x="480" y="103" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="9" font-weight="700">CODE</text>\n  <text x="480" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Parse response</text>\n  <text x="480" y="134" text-anchor="middle" fill="#4a7070" font-family="monospace" font-size="9">extract .content[0]</text>\n  <path d="M540,116 C570,116 580,116 600,116" stroke="#e8735a" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>\n  <rect x="600" y="90" width="100" height="52" rx="8" fill="#1a1412" stroke="#241c1a" stroke-width="1.5"/>\n  <text x="650" y="103" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="9" font-weight="700">SEND EMAIL</text>\n  <text x="650" y="121" text-anchor="middle" fill="#e8e0dc" font-family="monospace" font-size="10">Resend API</text>\n  <text x="650" y="134" text-anchor="middle" fill="#4a7070" font-family="monospace" font-size="9">to: {{email}}</text>\n  <text x="360" y="200" text-anchor="middle" fill="#4a7070" font-family="monospace" font-size="10">n8n canvas — your first workflow: Webhook → Claude → Parse → Send Email</text>\n</svg>', caption:"The n8n canvas — each box is a node. Connect them left to right and the workflow runs automatically." },
    { type:"tip-block", content:`<strong>Where to start in n8n:</strong> Three nodes. Webhook trigger → HTTP Request to Claude API → Send Email. That's it. Get comfortable with how data passes between nodes before you add anything else.` },
    { type:"heading", text:"The Claude API — Your AI Brain" },
    { type:"prose", content:`The API is simple on the surface: system prompt sets the rules, user message is the input, Claude returns a response. But how you structure that call makes a significant difference to output quality — so it's worth going deep here.` },
    { type:"code", content:`// The shape of every Claude API call you'll make
{
  "model": "claude-sonnet-4-6",      // Always use this model
  "max_tokens": 1024,                // Cap the response length
  "system": "Your directive here",   // The rules and context
  "messages": [
    {
      "role": "user",
      "content": "The actual input text: {{$json.email_body}}"
    }
  ]
}` },
    { type:"prose", content:`The parameters that actually matter:` },
    { type:"bullets", items:[
      "<strong>max_tokens:</strong> Caps how long the response can be. For a short email reply, 300 is plenty. For a full document summary, use 1500–2000. Higher costs more.",
      "<strong>temperature:</strong> Controls randomness (0 = deterministic, 1 = creative). For business workflows, use 0.2–0.4. You want consistency, not creativity.",
      "<strong>system:</strong> Your directive. This is the most important thing you write. It doesn't change between calls for the same workflow.",
      "<strong>messages:</strong> An array of turns. For most workflows, it's a single user message. For multi-turn flows, you include previous messages to give Claude context."
    ]},
    { type:"callout", content:`<strong>Prompt caching:</strong> If your system prompt is long and doesn't change between calls, Anthropic lets you cache it. You pay to process it once instead of on every request. At any real volume, this cuts costs significantly — worth setting up for client workflows.` },
    { type:"heading", text:"Supabase — Your Database" },
    { type:"prose", content:`Supabase is your database. PostgreSQL under the hood, but you interact with it through a clean dashboard and a REST API that n8n can call directly. You'll use it to log everything workflows process, store client data, and keep configuration that workflows read at runtime.` },
    { type:"bullets", items:[
      "<strong>Tables:</strong> Think of them like spreadsheets. Each row is a record. Each column is a field. A 'contacts' table might have columns: id, name, email, enquiry_type, reply_sent, created_at.",
      "<strong>Row Level Security (RLS):</strong> Controls who can read/write which rows. Enable it on every table and write policies. It prevents workflows or users from accessing data they shouldn't.",
      "<strong>Supabase client in n8n:</strong> Use the HTTP Request node to call Supabase's REST API. Or use the Postgres node and connect directly with your database credentials.",
      "<strong>Real-time subscriptions:</strong> Supabase can fire a webhook when a row is inserted or updated. Use this as a workflow trigger — e.g., when a new contact is added, start an onboarding sequence.",
      "<strong>Edge Functions:</strong> Serverless functions you can deploy to Supabase. Useful for more complex logic that n8n isn't ideal for."
    ]},
    { type:"svg-img", svg:'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" style="width:100%;height:auto;display:block;background:#060b0b">\n  <!-- header row -->\n  <rect x="20" y="20" width="680" height="32" rx="4" fill="#1a1412"/>\n  <text x="40" y="41" fill="#4a7070" font-family="monospace" font-size="11" font-weight="700">id</text>\n  <text x="100" y="41" fill="#4a7070" font-family="monospace" font-size="11" font-weight="700">name</text>\n  <text x="220" y="41" fill="#4a7070" font-family="monospace" font-size="11" font-weight="700">email</text>\n  <text x="390" y="41" fill="#4a7070" font-family="monospace" font-size="11" font-weight="700">enquiry_type</text>\n  <text x="530" y="41" fill="#4a7070" font-family="monospace" font-size="11" font-weight="700">status</text>\n  <text x="620" y="41" fill="#4a7070" font-family="monospace" font-size="11" font-weight="700">created_at</text>\n  <!-- rows -->\n  <rect x="20" y="56" width="680" height="28" rx="0" fill="#130f0e"/>\n  <text x="40" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">001</text>\n  <text x="100" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">Sarah M.</text>\n  <text x="220" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">sarah@email.com</text>\n  <text x="390" y="74" fill="#e8e0dc" font-family="monospace" font-size="11">BOOKING</text>\n  <rect x="527" y="62" width="44" height="14" rx="3" fill="#e8735a22"/>\n  <text x="549" y="73" text-anchor="middle" fill="#e8735a" font-family="monospace" font-size="9" font-weight="700">sent</text>\n  <text x="620" y="74" fill="#4a7070" font-family="monospace" font-size="10">2 mins ago</text>\n  <rect x="20" y="84" width="680" height="28" fill="#1a1412"/>\n  <text x="40" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">002</text>\n  <text x="100" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">James T.</text>\n  <text x="220" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">james@co.co.uk</text>\n  <text x="390" y="102" fill="#e8e0dc" font-family="monospace" font-size="11">GENERAL</text>\n  <rect x="527" y="90" width="44" height="14" rx="3" fill="#e8735a22"/>\n  <text x="549" y="101" text-anchor="middle" fill="#e8735a" font-family="monospace" font-size="9" font-weight="700">sent</text>\n  <text x="620" y="102" fill="#4a7070" font-family="monospace" font-size="10">14 mins ago</text>\n  <rect x="20" y="112" width="680" height="28" fill="#130f0e"/>\n  <text x="40" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">003</text>\n  <text x="100" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">Priya K.</text>\n  <text x="220" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">priya@health.io</text>\n  <text x="390" y="130" fill="#e8e0dc" font-family="monospace" font-size="11">BILLING</text>\n  <rect x="523" y="118" width="52" height="14" rx="3" fill="#22d4a015"/>\n  <text x="549" y="129" text-anchor="middle" fill="#22d4a0" font-family="monospace" font-size="9" font-weight="700">pending</text>\n  <text x="620" y="130" fill="#4a7070" font-family="monospace" font-size="10">1 hr ago</text>\n  <text x="360" y="178" text-anchor="middle" fill="#4a7070" font-family="monospace" font-size="10">Supabase log — every enquiry processed, classified, and timestamped automatically</text>\n</svg>', caption:"Supabase table — every workflow run logged as a row. Queryable, filterable, exportable." },
    { type:"heading", text:"Resend — Email Delivery" },
    { type:"prose", content:`Resend is just the best option for this. Clean API, solid deliverability, free tier that covers everything you need for your first few clients.` },
    { type:"code", content:`// Sending an email via Resend API (in n8n HTTP Request node)
POST https://api.resend.com/emails
Authorization: Bearer YOUR_RESEND_KEY

{
  "from": "noreply@yourclientdomain.com",
  "to": ["{{ $json.customer_email }}"],
  "subject": "Re: Your enquiry",
  "html": "{{ $json.ai_reply }}"
}` },
    { type:"prose", content:`<strong>Important:</strong> For client projects, use a subdomain they own for sending (e.g., noreply@clientbusiness.com). This protects their domain reputation and makes it look professional. Set up DNS records (SPF, DKIM) in Resend — it's a 5-minute process.` },
    { type:"heading", text:"Tally — Forms as Triggers" },
    { type:"prose", content:`Tally fires a webhook the moment someone submits a form. That webhook hits n8n, your workflow starts. It's the simplest way to create a trigger for a client-facing process — enquiry forms, intake forms, quote requests, anything.` },
    { type:"tip-block", content:`<strong>Connecting Tally to n8n:</strong> Create a Webhook trigger in n8n, copy the URL. In Tally: Integrations → Webhooks → paste it. Submit a test form. The data shows up in n8n and you build from there. Takes about 3 minutes.` },
    { type:"heading", text:"Vercel — Hosting and Serverless Functions" },
    { type:"prose", content:`Vercel is where anything web-facing lives. Client dashboards, custom API endpoints, portfolio site. The free tier covers everything until you're doing serious volume.` },
    { type:"prose", content:`Serverless functions are the interesting bit. Deploy a function, give it a URL, and any workflow can call it via HTTP. Use them for: PDF text extraction (can't do in n8n natively), complex data transformations, calling multiple APIs and combining results, or any logic that needs more than a Code node.` },
    { type:"heading", text:"How the Tools Connect: The Full Picture" },
    { type:"prose", content:`Understanding how these tools talk to each other is as important as knowing what each one does individually. Here's the data flow for a typical client workflow:` },
    { type:"bullets", items:[
      "<strong>Tally → n8n:</strong> User submits form. Tally fires a webhook POST request to your n8n webhook URL, carrying all form fields as JSON.",
      "<strong>n8n → Claude API:</strong> n8n formats the form data into a structured prompt, adds your system directive, and sends an HTTP POST to api.anthropic.com. Claude returns a JSON response.",
      "<strong>n8n → Supabase:</strong> n8n extracts Claude's reply from the response, then sends a POST to your Supabase REST endpoint to log the enquiry, the reply, and metadata.",
      "<strong>n8n → Resend:</strong> n8n takes Claude's reply and sends a POST to api.resend.com with the recipient email, subject, and HTML body. Resend delivers the email.",
      "<strong>Supabase → n8n (optional):</strong> A real-time subscription in Supabase fires a webhook when a row changes. For example: when someone updates a record to 'approved', a new n8n workflow fires to send a confirmation.",
    ]},
    { type:"heading", text:"n8n vs Writing Custom Code — When to Use Each" },
    { type:"prose", content:`n8n handles 80% of what you'll need. But knowing when to drop into custom code — via n8n's Code node, a Vercel function, or a standalone script — saves you from fighting n8n's limitations.` },
    { type:"bullets", items:[
      "<strong>Use n8n nodes for:</strong> Standard API integrations, simple data transformations, scheduling, webhook handling, email/Slack/database operations. n8n has 400+ pre-built integrations.",
      "<strong>Use n8n Code node for:</strong> Custom JavaScript logic within a workflow. Parsing complex JSON, reformatting data, doing calculations, building dynamic prompts from arrays of data.",
      "<strong>Use a Vercel function for:</strong> Heavy processing (PDF parsing, image processing), operations that need more than n8n's execution timeout, or any logic you want to reuse across multiple workflows via a shared API.",
      "<strong>Use a standalone script for:</strong> One-off data migrations, bulk operations on existing datasets, or anything that needs to run on a schedule outside n8n.",
    ]},
    { type:"tip-block", content:`<strong>n8n's biggest limitation:</strong> Execution timeout on the cloud plan is 5 minutes. If you're processing large documents or making many sequential API calls, you might hit this. Solution: use a Vercel function for the heavy lifting and call it from n8n, or break the workflow into smaller chunks with intermediate Supabase checkpoints.` },
  ],
  checklist:[
    "I know what each of the 5 main tools does and how they connect",
    "I understand how data flows between n8n nodes using expressions",
    "I can explain the key Claude API parameters (model, max_tokens, system, messages)",
    "I know what Supabase tables are and why RLS matters",
    "I've set up Tally → n8n webhook integration at least once"
  ]
},

// ─── 4: DATA AND CONTEXT ─────────────────────────────────────────────────────
{
  badge:"Module 4 · Foundations", title:"Data, Context & Making AI Smarter", readTime:"16 min",
  subtitle:"How to feed AI the right information so it produces outputs worth using.",
  sections:[
    { type:"heading", text:"The Context Window" },
    { type:"prose", content:`The context window is everything Claude can see at once — system prompt, input data, conversation history, any documents you pass in. Sonnet 4.6's limit is 200k tokens, which is roughly 150,000 words. You're not going to hit it. Don't worry about it.` },
    { type:"prose", content:`What matters is <strong>what's actually in there.</strong> Claude cannot use information it can't see. Obvious when stated, but easy to forget when building. If you want it to reference the client's name, the name has to be in the prompt. Better context in, better output out — every time.` },
    { type:"heading", text:"How to Structure Input Data" },
    { type:"prose", content:`Dumping raw text into a prompt and hoping Claude figures it out works sometimes. Structured, labelled input works reliably. There's a big difference.` },
    { type:"two-col", items:[
      { title:"❌ Unstructured (Bad)", body:"'john smith called about his invoice being wrong the invoice number was 1042 and he paid £200 but the invoice says £250 he is annoyed'" },
      { title:"✅ Structured (Good)", body:"'Customer Name: John Smith<br>Issue Type: Billing dispute<br>Invoice Number: 1042<br>Amount Paid: £200<br>Invoice Amount: £250<br>Customer Sentiment: Frustrated'" }
    ]},
    { type:"prose", content:`Add a Code node before any AI step that does nothing but clean and structure the input. It's five minutes of work that makes outputs noticeably better.` },
    { type:"heading", text:"Giving AI a Knowledge Base" },
    { type:"prose", content:`Claude needs business-specific knowledge to be useful for a client. There are three ways to get it there, and which one you use depends on how much there is and how often it changes.` },
    { type:"bullets", items:[
      "<strong>In the system prompt (best for small, stable info):</strong> If the knowledge base is under ~5,000 words and doesn't change often, put it directly in the system prompt. Easy to update, always available. Clinic hours, service list, FAQ answers, team names.",
      "<strong>Retrieved from Supabase (best for large or dynamic info):</strong> Query the database at workflow runtime and inject the results into the prompt. Use this for product catalogues, pricing tables, customer history, anything that changes. The n8n workflow fetches the relevant rows, formats them, and adds them to the context before calling Claude.",
      "<strong>Document in the prompt (for one-off analysis):</strong> Pass the full text of a document — a contract, a CV, an invoice — as part of the user message. Ask Claude to extract, summarise, or analyse it."
    ]},
    { type:"callout", content:`<strong>RAG:</strong> A more advanced version of the Supabase approach. You embed documents as vectors and retrieve only the relevant chunks at runtime rather than passing everything. You don't need this for 90% of client projects — it's worth knowing it exists but don't go down that rabbit hole until you're specifically building something that needs it.` },
    { type:"heading", text:"Handling Variable Input" },
    { type:"prose", content:`Real inputs are a mess. People leave fields blank, write novels instead of one-liners, copy-paste garbled text, reply to automated emails with 'thanks'. Your workflow sees all of it. Handle it before it reaches Claude.` },
    { type:"bullets", items:[
      "<strong>Always validate input before calling AI:</strong> Check that required fields exist. If an email body is empty, skip the AI call and log an error. Don't let Claude try to process nothing.",
      "<strong>Set defaults for missing fields:</strong> If the customer name wasn't captured, use 'there' as a fallback (Hi there, vs Hi [blank],). In n8n, use an IF node to check and set defaults.",
      "<strong>Trim and clean text:</strong> Remove extra whitespace, HTML tags from forwarded emails, email signatures that add noise. A Code node with a few lines of regex does this.",
      "<strong>Limit input length:</strong> Very long inputs can push you over context limits and cost more. Truncate input to the first 2,000 characters if you only need the beginning of an email."
    ]},
    { type:"heading", text:"Using Outputs as Inputs" },
    { type:"prose", content:`Chaining is where things get genuinely powerful. The output from one Claude step feeds directly into the next. Each step handles one job, but together they tackle something complex.` },
    { type:"example-card", title:"Chaining Example — Lead Qualification", body:"<strong>Step 1</strong>: Claude reads a contact form submission and outputs a JSON object: { 'urgency': 'high', 'budget_signal': 'mentioned £500/month', 'fit': 'good', 'reply_needed': true }<br><br><strong>Step 2</strong>: n8n routes based on urgency. High-urgency leads go to a second Claude step that writes a personalised, high-effort reply. Low-urgency leads get a lighter template response.<br><br><strong>Step 3</strong>: Both paths log to Supabase, and a Slack message is sent to the sales team for high-urgency leads." },
    { type:"tip-block", content:`<strong>Getting structured output from Claude:</strong> Tell it explicitly — 'Respond ONLY with a valid JSON object. No preamble, no explanation, no backticks.' Then parse it in a Code node: JSON.parse($json.content[0].text). If you're not explicit, it'll wrap the JSON in a sentence and break your parser.` },
    { type:"heading", text:"Token Economics — Understanding API Costs" },
    { type:"prose", content:`Every Claude API call costs money based on tokens — roughly 4 characters per token. Understanding this keeps your costs predictable and helps you build efficient workflows.` },
    { type:"bullets", items:[
      "<strong>Input tokens:</strong> Everything you send to Claude — your system prompt, the user message, any documents. System prompts can be long without much cost per call if you use prompt caching.",
      "<strong>Output tokens:</strong> What Claude sends back. Short, structured outputs (JSON classifications, brief replies) cost significantly less than long document summaries. Use max_tokens to cap this.",
      "<strong>Prompt caching:</strong> If your system prompt is static (same for every call in a workflow), Anthropic caches it after the first call. Subsequent calls pay only for the new input. On high-volume workflows, this cuts costs by 70-90%.",
      "<strong>Cost estimation:</strong> A typical enquiry workflow — 500 token system prompt, 200 token input, 150 token output — costs roughly £0.002 per run. At 1,000 runs/month, that's £2. Cost is almost never the constraint.",
    ]},
    { type:"heading", text:"Structuring Prompts for Consistency" },
    { type:"prose", content:`The format of your prompt affects the format of the output. Use these patterns to get consistent, parseable responses every time.` },
    { type:"bullets", items:[
      "<strong>XML tags for structure:</strong> Claude responds well to XML-style tags in prompts. 'The enquiry is: <enquiry>{{message}}</enquiry> The business info is: <business_info>{{info}}</business_info>'. This makes it clear which part of the context is which.",
      "<strong>Few-shot examples:</strong> Provide 2-3 examples of ideal input → output pairs in your system prompt. 'Here is an example of a well-classified enquiry: INPUT: [example] OUTPUT: BOOKING'. These dramatically anchor output format.",
      "<strong>Explicit delimiters:</strong> When passing multiple pieces of data, use clear separators. '---CUSTOMER EMAIL---', '---END EMAIL---'. Prevents Claude from confusing different data sources.",
      "<strong>Role anchoring:</strong> Remind Claude of its role at the end of long system prompts. 'Remember: your only job is to [specific task]. Do not do anything else.' This prevents context drift in long prompts.",
    ]},
  ],
  checklist:[
    "I understand what the context window is and why it matters",
    "I can restructure messy input data before passing it to Claude",
    "I know the 3 ways to give Claude a knowledge base and when to use each",
    "I can handle missing or variable fields in workflow inputs",
    "I can chain AI outputs as inputs to subsequent steps",
    "I understand how API costs work and how to estimate them",
    "I know how to use XML tags, few-shot examples, and delimiters to improve outputs"
  ]
},

// ─── 5: TESTING AND RELIABILITY ──────────────────────────────────────────────
{
  badge:"Module 5 · Foundations", title:"Testing, Reliability & Maintenance", readTime:"15 min",
  subtitle:"How to build workflows that don't embarrass you in front of clients.",
  sections:[
    { type:"heading", text:"Why Testing is Everything" },
    { type:"prose", content:`90% reliability isn't a product — it's a problem waiting to happen. Nobody notices the nine times it works perfectly. They notice the one time it emails a customer something wrong. <strong>Your actual product is reliability. The AI is just how you achieve it.</strong>` },
    { type:"heading", text:"The 4 Stages of Testing" },
    { type:"numbered-list", items:[
      "<strong>Happy path testing:</strong> Test with clean, expected input. Make sure the basic flow works end to end. This is what most beginners stop at.",
      "<strong>Edge case testing:</strong> What if the email is empty? What if the customer writes in a different language? What if the form has a field missing? What if the input is unusually long? Test every 'what if' you can think of.",
      "<strong>Adversarial testing:</strong> Try to break it. Send rude messages. Send messages with no clear question. Send messages asking Claude to ignore its instructions. A good directive handles all of these without producing harmful or nonsensical output.",
      "<strong>Volume testing:</strong> Run 50+ real or realistic inputs through the workflow. Look for patterns in failures. If 3 out of 50 produce bad outputs, find what they have in common and fix the directive."
    ]},
    { type:"heading", text:"Building a Test Set" },
    { type:"prose", content:`Before you hand anything over, build a test set of 20–30 inputs — not cherry-picked ones, genuinely varied. Short messages, long ones, vague ones, aggressive ones, ones with missing fields. Run the whole workflow against all of them and read every output. This catches the things you didn't think to account for.` },
    { type:"tip-block", content:`<strong>Get real examples from the client.</strong> During scoping: 'Can you forward me 20 messages you typically receive?' This gives you a proper test set and means you've already proven it works on their actual data before anything goes live.` },
    { type:"heading", text:"Error Handling in n8n" },
    { type:"prose", content:`Without error handling, failures are invisible. The workflow just stops, the message goes unprocessed, and you find out when the client asks why a customer never got a reply. That's a bad day.` },
    { type:"bullets", items:[
      "<strong>Error workflow:</strong> In n8n, set an 'Error Workflow' in workflow settings. This is a separate workflow that runs when the main one fails. Have it send you a Telegram message or email with the error details.",
      "<strong>Try/Catch nodes:</strong> Wrap API calls in error handling. If the Claude API call fails (rate limit, timeout), catch the error and retry after 5 seconds. Most transient failures resolve on retry.",
      "<strong>Fallback outputs:</strong> If Claude produces an output that fails validation (e.g., it was supposed to return JSON but returned plain text), have a fallback path that handles this gracefully — logs the issue and routes to a human review queue.",
      "<strong>Dead letter queue:</strong> Any message that fails processing after retries gets written to a 'failed_messages' Supabase table. You can then review and reprocess manually. Nothing gets lost."
    ]},
    { type:"heading", text:"Monitoring in Production" },
    { type:"prose", content:`Once something's live, you need to actually know if it's working. Not 'assume it's working'. Know.` },
    { type:"bullets", items:[
      "<strong>Execution logs in n8n:</strong> Every run is logged. You can see what input came in, what each step produced, and whether it succeeded or failed. Check these daily for the first week after launch.",
      "<strong>Supabase audit table:</strong> Write a log entry for every workflow run — timestamp, input summary, output summary, success/failure, processing time. This gives you a business-level view of activity.",
      "<strong>Weekly summary:</strong> Build a second workflow that runs every Monday, queries the audit table, and emails you (and optionally the client) a summary: '127 enquiries processed this week. 2 failures. Average response time 3.2 seconds.' Clients love this — it makes the value visible.",
    ]},
    { type:"heading", text:"Maintaining and Updating Workflows" },
    { type:"prose", content:`Workflows aren't set-and-forget. The business changes — new prices, new staff, new services. Your system prompt becomes wrong and nobody notices until a client asks why the AI quoted old pricing. Stay on top of it.` },
    { type:"bullets", items:[
      "<strong>Version your prompts:</strong> When you update a system prompt, keep a copy of the old version with a date. If a change makes things worse, you can roll back.",
      "<strong>Schedule monthly reviews:</strong> Check the Supabase audit table for any uptick in failures. Read a sample of 10 recent outputs to make sure quality is still good. Takes 20 minutes.",
      "<strong>Notify clients of changes:</strong> If you update something significant, send a quick email: 'I've updated the workflow to include your new pricing. It's live now.' This is part of what they pay the retainer for.",
    ]},
    { type:"warning-block", content:`<strong>Never push changes directly to a live workflow.</strong> Copy it, make the change, test it against your test set, then push live. One bad update that fires wrong emails to 50 customers can end the client relationship overnight.` },
    { type:"heading", text:"Building a Quality Scoring System" },
    { type:"prose", content:`For client workflows, don't just check 'did it run' — check 'was the output good'. Build a lightweight scoring system into your monitoring.` },
    { type:"bullets", items:[
      "<strong>Output length check:</strong> If Claude was supposed to write a 100-word reply but returned 5 words, something went wrong. Flag any output shorter than a minimum threshold.",
      "<strong>Keyword presence:</strong> For classification workflows, check that the output is one of the expected values. If the expected outputs are BOOKING / BILLING / GENERAL and Claude returns 'I think this is a booking enquiry', your parser will fail.",
      "<strong>Sentiment sanity check:</strong> For customer-facing replies, run a second lightweight check: does the reply contain any negative language, apologies, or refusals that shouldn't be there? Log these for manual review.",
      "<strong>Response time tracking:</strong> Log start and end timestamps for each workflow run. If average processing time jumps from 2s to 12s, something changed — might be API latency, might be a prompt that's now generating very long outputs.",
    ]},
    { type:"heading", text:"Client Handover: What to Document" },
    { type:"prose", content:`When you deliver a workflow to a client, give them a handover document covering everything they need to know without needing to call you. This protects both of you.` },
    { type:"bullets", items:[
      "<strong>What the workflow does:</strong> One paragraph. Plain English. No jargon.",
      "<strong>What triggers it:</strong> 'Every time someone submits the contact form at yoursite.com/contact'.",
      "<strong>What they'll see:</strong> Screenshots of the Supabase log, the email that gets sent, any Slack notifications.",
      "<strong>What to do if something seems wrong:</strong> 'Check the n8n execution log at [URL]. If you see red X marks, email me at [address]. Do not change anything until I've looked at it.'",
      "<strong>What not to change:</strong> List the things that will break the workflow if modified — the form field names, the Supabase table structure, the email domain.",
    ]},
  ],
  checklist:[
    "I know all 4 stages of testing and apply them before any launch",
    "I always build a test set of 20+ inputs before going live",
    "I've set up n8n error workflows and understand dead letter queues",
    "I know how to monitor a live workflow using execution logs and Supabase",
    "I have a process for maintaining and updating workflows after launch",
    "I know how to build a quality scoring system for output validation",
    "I can produce a complete client handover document"
  ]
},

{

    { type:"callout", content:`<strong>Why this specific build:</strong> It covers every concept — trigger, data processing, AI step, action, database log. And once you've built it once, reskinning it for a new client industry takes less than an hour. That's the point — this isn't a learning exercise, it's the foundation of your service.` },
